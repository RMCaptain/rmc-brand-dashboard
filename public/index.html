<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMC Brand Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="rmc-nav">
    <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="nav-logo">
          <img src="/rmc-logo.png" alt="RMC" />
        </a>
        <div class="flex gap-1">
          <a href="/" class="nav-link active">Dashboard</a>
          <a href="/brands.html" class="nav-link">Brands</a>
          <a href="/products.html" class="nav-link">Products</a>
          <a href="/po.html" class="nav-link">PO Builder</a>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="cur-toggle">
          <button id="toggleCAD" onclick="setCurrency('CAD')" class="cur-btn">CA$</button>
          <button id="toggleUSD" onclick="setCurrency('USD')" class="cur-btn">US$</button>
        </div>
        <span id="lastSyncText" class="text-xs hidden md:inline" style="color:var(--text-3)"></span>
        <button id="syncBtn" onclick="triggerSync()" class="btn-primary" style="font-size:12px;padding:7px 14px;">
          Sync Data
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-2xl mx-auto px-6 py-6">

    <!-- Sync status bar -->
    <div id="syncBar" class="hidden mb-4 sync-bar">
      <div class="sync-pulse"></div>
      <span class="text-sm" style="color:var(--text-2)">Sync in progress — this takes 15–20 minutes. You can keep using the dashboard.</span>
    </div>

    <!-- 4 Tiles -->
    <div class="tile-row mb-8" id="tilesRow">
      <!-- Rendered by JS -->
    </div>

    <!-- Bottom table -->
    <div class="rmc-card overflow-hidden">
      <div class="px-5 py-3 flex items-center justify-between flex-wrap gap-2" style="border-bottom:1px solid var(--border)">
        <div class="flex items-center gap-4">
          <!-- View tabs -->
          <div class="view-tabs">
            <button onclick="setTableView('products')" id="view-products" class="view-tab">Products</button>
            <button onclick="setTableView('brands')"   id="view-brands"   class="view-tab">Brands</button>
          </div>
          <!-- Preset selector -->
          <div class="flex gap-1">
            <button onclick="setBrandPreset('last30d')"   id="bp-last30d"   class="bp-btn">Last 30d</button>
            <button onclick="setBrandPreset('lastMonth')" id="bp-lastMonth" class="bp-btn">Last Month</button>
          </div>
        </div>
      </div>

      <!-- Products table -->
      <div id="productsView" class="overflow-x-auto">
        <table class="rmc-table" style="overflow:visible">
          <thead>
            <tr>
              <th class="text-left min-w-64" style="padding-left:20px">Product</th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('units')">Units Sold <span class="sort-ind" data-col="units"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('revenue')">Sales <span class="sort-ind" data-col="revenue"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('cvr')">CVR <span class="sort-ind" data-col="cvr"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('buyBox')">Buy Box <span class="sort-ind" data-col="buyBox"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('inventory')">Inventory <span class="sort-ind" data-col="inventory"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('costPerUnit')">COGS <span class="sort-ind" data-col="costPerUnit"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('totalCogs')">Total COGS <span class="sort-ind" data-col="totalCogs"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('grossProfit')">Gross Profit <span class="sort-ind" data-col="grossProfit"></span></th>
              <th class="sortable-th text-right cursor-pointer select-none hover:text-white" onclick="sortBy('margin')">Margin <span class="sort-ind" data-col="margin"></span></th>
            </tr>
          </thead>
          <tbody id="productTableBody">
            <tr><td colspan="10" class="text-center py-8" style="color:var(--text-3)">Loading...</td></tr>
          </tbody>
        </table>
        <div id="productPagination"></div>
      </div>

      <!-- Brands table -->
      <div id="brandsView" class="overflow-x-auto hidden">
        <table class="rmc-table">
          <thead>
            <tr>
              <th class="sortable-brand-th text-left cursor-pointer select-none hover:text-white" onclick="sortBrandBy('name')" style="padding-left:20px">Brand <span class="sort-brand-ind" data-col="name"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('revenue')">Revenue <span class="sort-brand-ind" data-col="revenue"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('units')">Units Sold <span class="sort-brand-ind" data-col="units"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('cogs')">COGS <span class="sort-brand-ind" data-col="cogs"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('grossProfit')">Gross Profit <span class="sort-brand-ind" data-col="grossProfit"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('margin')">Margin <span class="sort-brand-ind" data-col="margin"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('sessions')">Sessions <span class="sort-brand-ind" data-col="sessions"></span></th>
              <th class="sortable-brand-th text-right cursor-pointer select-none hover:text-white" onclick="sortBrandBy('buyBox')">Buy Box <span class="sort-brand-ind" data-col="buyBox"></span></th>
            </tr>
          </thead>
          <tbody id="brandTableBody">
            <tr><td colspan="8" class="text-center py-8" style="color:var(--text-3)">Loading...</td></tr>
          </tbody>
        </table>
        <div id="brandPagination"></div>
      </div>
    </div>

  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let brandsData = [];
    let presetMetrics = {};
    let currency = localStorage.getItem('currency') || 'CAD';
    let fxRate = { usdToCad: 1.38, cadToUsd: 0.724 };
    let activeBrandPreset = localStorage.getItem('brandPreset') || 'last30d';
    let activeTileKey = null;
    let activeTableView = localStorage.getItem('tableView') || 'products';
    let sortCol = 'revenue';
    let sortDir = -1; // -1 desc, 1 asc
    let brandSortCol = 'revenue';
    let brandSortDir = -1;
    let productPage = 1;
    let brandPage = 1;
    let pageSize = parseInt(localStorage.getItem('pageSize') || '20');

    const TILE_CONFIG = [
      { key: 'last30d',   label: 'Last 30 Days', color: 'from-violet-700 to-violet-800', accent: '#7c3aed' },
      { key: 'lastMonth', label: 'Last Month',   color: 'from-emerald-700 to-emerald-800', accent: '#059669' }
    ];

    // ── Formatting ────────────────────────────────────────────────────────────
    function fmtMoney(cad, usd = 0) {
      if (currency === 'CAD') {
        const t = (cad || 0) + (usd || 0) * fxRate.usdToCad;
        return 'CA$' + t.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      const t = (usd || 0) + (cad || 0) * fxRate.cadToUsd;
      return 'US$' + t.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(val) {
      return val != null ? val.toFixed(2) + '%' : '—';
    }

    function getNum(cad, usd = 0) {
      if (currency === 'CAD') return (cad || 0) + (usd || 0) * fxRate.usdToCad;
      return (usd || 0) + (cad || 0) * fxRate.cadToUsd;
    }


    // ── COGS calculation ──────────────────────────────────────────────────────
    function calcCogs(presetKey) {
      let cad = 0, usd = 0;
      for (const brand of brandsData) {
        const bm = presetMetrics.presets?.[presetKey]?.brands?.[brand.id];
        if (!bm?.skus) continue;
        for (const sku of bm.skus) {
          const cogsCA = brand.cogsPerMarketplace?.[sku.asin]?.CA ?? (brand.marketplace !== 'US' ? brand.cogs?.[sku.asin] : null) ?? 0;
          const cogsUS = brand.cogsPerMarketplace?.[sku.asin]?.US ?? (brand.marketplace === 'US' ? brand.cogs?.[sku.asin] : null) ?? 0;
          const unitsCa = sku.unitsCad != null ? sku.unitsCad : (brand.marketplace !== 'US' ? sku.units : 0);
          const unitsUs = sku.unitsUsd != null ? sku.unitsUsd : (brand.marketplace === 'US' ? sku.units : 0);
          cad += unitsCa * cogsCA;
          usd += unitsUs * cogsUS;
        }
      }
      return { cad: Math.round(cad * 100) / 100, usd: Math.round(usd * 100) / 100 };
    }

    // ── Tile metrics ──────────────────────────────────────────────────────────
    function getTileMetrics(presetKey) {
      const preset = presetMetrics.presets?.[presetKey];
      if (!preset) return null;

      // Aggregate across all brands
      let revCad = 0, revUsd = 0, units = 0, sessions = 0, refundUnits = 0;
      for (const bm of Object.values(preset.brands || {})) {
        revCad += bm.summary?.revenueCad || 0;
        revUsd += bm.summary?.revenueUsd || 0;
        units  += bm.summary?.units || 0;
        sessions += bm.summary?.sessions || 0;
      }

      const fin = preset.financials || {};
      const fCad = fin.CAD || {};
      const fUsd = fin.USD || {};

      const cogs = calcCogs(presetKey);

      // All figures in selected display currency
      const sales       = getNum(revCad, revUsd);
      const amzFees     = getNum(fCad.amazonFees, fUsd.amazonFees);
      const serviceFees = getNum(fCad.serviceFees || 0, fUsd.serviceFees || 0);
      const refunds     = getNum(fCad.refundAmount, fUsd.refundAmount);
      const refundFee   = getNum(fCad.refundFees, fUsd.refundFees);
      const refundCount = fin.refundCount || 0;
      const adSpend     = getNum(fCad.adSpend, fUsd.adSpend);
      const cogsTotal   = getNum(cogs.cad, cogs.usd);

      const grossProfit = sales - cogsTotal - amzFees - serviceFees - refunds - refundFee - adSpend;
      const netProfit   = grossProfit;
      const estPayout   = sales - amzFees - serviceFees - adSpend - refunds;
      const margin      = sales > 0 ? (netProfit / sales) * 100 : null;
      const roi         = cogsTotal > 0 ? (netProfit / cogsTotal) * 100 : null;
      const realAcos    = sales > 0 ? (adSpend / sales) * 100 : null;
      const pctRefunds  = sales > 0 ? (refunds / sales) * 100 : null;

      const fmtC = v => {
        const sym = currency === 'CAD' ? 'CA$' : 'US$';
        return sym + Math.abs(v).toLocaleString(currency === 'CAD' ? 'en-CA' : 'en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      };

      return {
        sales, units, sessions, amzFees, serviceFees, refunds, refundCount, refundFee, adSpend,
        cogsTotal, grossProfit, netProfit, estPayout, margin, roi,
        realAcos, pctRefunds,
        startDate: preset.startDate, endDate: preset.endDate,
        fmtC
      };
    }

    // ── Tile rendering ────────────────────────────────────────────────────────
    function renderTiles() {
      const container = document.getElementById('tilesRow');
      container.innerHTML = TILE_CONFIG.map(tc => buildTile(tc)).join('');
    }

    function buildTile({ key, label, accent }) {
      const m = getTileMetrics(key);
      const preset = presetMetrics.presets?.[key];

      const fmtD = d => d ? new Date(d + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
      const dateStr = preset
        ? (preset.startDate === preset.endDate ? fmtD(preset.startDate) : `${fmtD(preset.startDate)} – ${fmtD(preset.endDate)}`)
        : '—';

      if (!m) {
        return `<div class="rmc-card overflow-hidden" style="border-top:3px solid ${accent}">
          <div class="px-4 py-4">
            <div class="text-sm font-semibold mb-0.5" style="color:${accent}">${label}</div>
            <div class="text-xs" style="color:var(--text-3)">${dateStr}</div>
            <p class="text-xs mt-4" style="color:var(--text-3)">No data — run sync</p>
          </div>
        </div>`;
      }

      const { fmtC } = m;
      const gpClass  = m.grossProfit >= 0 ? 'text-emerald-400' : 'text-red-400';
      const npClass  = m.netProfit   >= 0 ? 'text-emerald-400' : 'text-red-400';
      const mgnColor = m.margin != null ? (m.margin >= 0 ? 'text-emerald-400' : 'text-red-400') : 'text-slate-500';
      const mgnStr   = m.margin != null ? m.margin.toFixed(1) + '%' : '';

      const row = (lbl, val, valClass = '') =>
        `<div class="flex items-center justify-between py-2" style="border-bottom:1px solid rgba(255,255,255,0.05)">
          <span class="text-xs" style="color:var(--text-2)">${lbl}</span>
          <span class="text-xs font-medium ${valClass}" ${!valClass ? 'style="color:var(--text)"' : ''}>${val}</span>
        </div>`;

      const feeRows = buildFeeBreakdownRows(key, fmtC);

      const detailOverlay = `
        <div id="tile-detail-${key}" class="hidden absolute inset-0 z-10 flex flex-col overflow-hidden" style="background:var(--bg-surface);border-radius:var(--r);border-top:3px solid ${accent};border:1px solid var(--border-hi);border-top:3px solid ${accent}">
          <div class="flex items-center justify-between px-4 py-3 flex-shrink-0" style="border-bottom:1px solid var(--border)">
            <div>
              <div class="text-sm font-semibold text-white">${label}</div>
              <div class="text-xs text-slate-400 mt-0.5">${dateStr}</div>
            </div>
            <button onclick="closeTileDetail('${key}')" class="transition-colors p-0.5 flex-shrink-0 hover:opacity-80" style="color:var(--text-3)">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div class="overflow-y-auto flex-1 px-4 py-1">
            ${row('Sales', fmtC(m.sales))}
            ${row('Units', m.units.toLocaleString())}
            ${row('Refunds', m.refundCount.toLocaleString(), m.refundCount > 0 ? 'text-red-400' : 'text-slate-500')}
            ${row('Adv. cost', m.adSpend > 0 ? '-' + fmtC(m.adSpend) : '—', m.adSpend > 0 ? 'text-red-400' : 'text-slate-500')}
            ${row('Refund cost', m.refundFee > 0 ? '-' + fmtC(m.refundFee) : '—', m.refundFee > 0 ? 'text-red-400' : 'text-slate-500')}
            <div class="flex items-center justify-between py-2 cursor-pointer hover:opacity-80 -mx-4 px-4" style="border-bottom:1px solid rgba(255,255,255,0.05)"
                 onclick="toggleTileFees('${key}')">
              <div class="flex items-center gap-1.5">
                <svg id="fee-chevron-${key}" class="w-3 h-3 text-slate-500 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
                <span class="text-xs text-slate-400">Amazon fees</span>
              </div>
              <span class="text-xs font-medium text-red-400">-${fmtC(m.amzFees + m.serviceFees)}</span>
            </div>
            <div id="fee-breakdown-${key}" class="hidden">${feeRows}</div>
            ${row('Cost of goods', m.cogsTotal > 0 ? '-' + fmtC(m.cogsTotal) : '—', m.cogsTotal > 0 ? 'text-red-400' : 'text-slate-500')}
            <div class="my-1.5" style="border-top:1px solid var(--border)"></div>
            ${row('Gross profit', (m.grossProfit < 0 ? '-' : '') + fmtC(Math.abs(m.grossProfit)), gpClass)}
            ${row('Net profit', (m.netProfit < 0 ? '-' : '') + fmtC(Math.abs(m.netProfit)), npClass)}
            ${row('Est. payout', fmtC(m.estPayout))}
            <div class="my-1.5" style="border-top:1px solid var(--border)"></div>
            ${row('Real ACOS', fmtPct(m.realAcos))}
            ${row('% Refunds', fmtPct(m.pctRefunds))}
            ${row('Margin', fmtPct(m.margin), m.margin != null ? (m.margin >= 0 ? 'text-emerald-400' : 'text-red-400') : '')}
            ${row('ROI', m.roi != null ? m.roi.toFixed(1) + '%' : m.cogsTotal === 0 ? '<span style="color:var(--text-3)">Enter COGS</span>' : '—', m.roi != null ? (m.roi >= 0 ? 'text-emerald-400' : 'text-red-400') : '')}
          </div>
        </div>`;

      return `
        <div class="rmc-card rmc-card-hover relative overflow-hidden" style="border-top:3px solid ${accent}">
          <div class="px-4 pt-4 pb-0">
            <div class="flex items-center justify-between mb-3">
              <div>
                <div class="text-xs font-semibold" style="color:${accent}">${label}</div>
                <div class="text-xs mt-0.5" style="color:var(--text-3)">${dateStr}</div>
              </div>
            </div>
            <div class="mb-3 pb-3" style="border-bottom:1px solid var(--border)">
              <div class="text-xs mb-1" style="color:var(--text-2)">Sales</div>
              <div class="text-2xl font-bold" style="color:var(--text)">${fmtC(m.sales)}</div>
            </div>
            <div class="grid grid-cols-2 gap-x-4 gap-y-3 pb-3">
              <div>
                <div class="text-xs mb-0.5" style="color:var(--text-3)">Units Sold</div>
                <div class="text-sm font-semibold" style="color:var(--text)">${m.units.toLocaleString()}</div>
              </div>
              <div>
                <div class="text-xs mb-0.5" style="color:var(--text-3)">Refunds</div>
                <div class="text-sm font-semibold ${m.refundCount > 0 ? 'text-red-400' : ''}" style="${m.refundCount === 0 ? 'color:var(--text-3)' : ''}">${m.refundCount.toLocaleString()}</div>
              </div>
              <div>
                <div class="text-xs mb-0.5" style="color:var(--text-3)">Adv. cost</div>
                <div class="text-sm font-semibold ${m.adSpend > 0 ? 'text-red-400' : ''}" style="${m.adSpend === 0 ? 'color:var(--text-3)' : ''}">-${fmtC(m.adSpend)}</div>
              </div>
              <div>
                <div class="text-xs mb-0.5" style="color:var(--text-3)">Est. payout</div>
                <div class="text-sm font-semibold" style="color:var(--text)">${fmtC(m.estPayout)}</div>
              </div>
              <div>
                <div class="text-xs mb-0.5" style="color:var(--text-3)">Gross profit</div>
                <div class="text-sm font-semibold ${gpClass}">${m.grossProfit < 0 ? '-' : ''}${fmtC(Math.abs(m.grossProfit))}</div>
              </div>
              <div>
                <div class="text-xs mb-0.5" style="color:var(--text-3)">Net profit${mgnStr ? ` <span class="${mgnColor} font-medium">${mgnStr}</span>` : ''}</div>
                <div class="text-sm font-semibold ${npClass}">${m.netProfit < 0 ? '-' : ''}${fmtC(Math.abs(m.netProfit))}</div>
              </div>
            </div>
            <button onclick="openTileDetail('${key}')"
              class="w-full flex items-center justify-between text-xs px-1 py-2.5 group transition-colors hover:opacity-80"
              style="border-top:1px solid var(--border);color:var(--text-3)">
              <span class="font-medium">Full breakdown</span>
              <svg class="w-3.5 h-3.5 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
          ${detailOverlay}
        </div>`;
    }

    function openTileDetail(key) {
      document.getElementById(`tile-detail-${key}`)?.classList.remove('hidden');
    }

    function closeTileDetail(key) {
      document.getElementById(`tile-detail-${key}`)?.classList.add('hidden');
    }

    function toggleTileFees(key) {
      const bd = document.getElementById(`fee-breakdown-${key}`);
      const chevron = document.getElementById(`fee-chevron-${key}`);
      if (!bd) return;
      bd.classList.toggle('hidden');
      chevron?.classList.toggle('rotate-90', !bd.classList.contains('hidden'));
    }

    function buildFeeBreakdownRows(presetKey, fmtC) {
      const fin = presetMetrics.presets?.[presetKey]?.financials;
      if (!fin) return '<div class="py-1.5 pl-5 text-xs text-slate-600">No data</div>';
      const cadBD = fin.CAD?.breakdown || {};
      const usdBD = fin.USD?.breakdown || {};
      const groups = new Set([...Object.keys(cadBD), ...Object.keys(usdBD)]);
      if (!groups.size) return '<div class="py-1.5 pl-5 text-xs text-slate-600">No breakdown — sync needed</div>';
      const ORDER = ['FBA Fulfillment', 'Referral Fee', 'Storage', 'Inbound', 'Removal', 'Vine', 'Coupons', 'Closing Fee', 'Other'];
      const sorted = [...groups].sort((a, b) => {
        const ai = ORDER.indexOf(a), bi = ORDER.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });
      return sorted.map(g => {
        const total = getNum(cadBD[g] || 0, usdBD[g] || 0);
        if (total < 0.01) return '';
        return `<div class="flex items-center justify-between py-1.5 pl-5" style="border-bottom:1px solid rgba(255,255,255,0.04)">
          <span class="text-xs" style="color:var(--text-2)">${g}</span>
          <span class="text-xs font-medium text-red-400">-${fmtC(total)}</span>
        </div>`;
      }).join('');
    }

    // ── Table view toggle ─────────────────────────────────────────────────────
    function setTableView(view) {
      activeTableView = view;
      localStorage.setItem('tableView', view);
      document.getElementById('productsView').classList.toggle('hidden', view !== 'products');
      document.getElementById('brandsView').classList.toggle('hidden', view !== 'brands');
      document.getElementById('view-products').classList.toggle('active', view === 'products');
      document.getElementById('view-brands').classList.toggle('active', view === 'brands');
    }

    // ── Product table ─────────────────────────────────────────────────────────
    function mpBadge(mp) {
      const s = mp === 'CA' ? 'background:#1e3a5f;color:#60a5fa' : mp === 'US' ? 'background:#1a3a1a;color:#4ade80' : 'background:#2a2a2a;color:#888';
      return `<span style="${s};font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:0.05em;vertical-align:middle;display:inline-block">${mp}</span>`;
    }

    function getAllSkus(presetKey) {
      const preset = presetMetrics.presets?.[presetKey];
      if (!preset) return [];
      const skus = [];
      for (const brand of brandsData) {
        const bm = preset.brands?.[brand.id];
        if (!bm?.skus) continue;
        for (const sku of bm.skus) {
          const mps = sku.marketplaces?.length ? sku.marketplaces
            : (sku.revenueCad > 0 && sku.revenueUsd > 0 ? ['CA', 'US']
               : sku.revenueUsd > 0 ? ['US'] : ['CA']);
          for (const mp of mps) {
            const isCA = mp === 'CA';
            const costPerUnit = brand.cogsPerMarketplace?.[sku.asin]?.[mp] ?? brand.cogs?.[sku.asin] ?? 0;
            const totalRev = (sku.revenueCad || 0) + (sku.revenueUsd || 0) * (fxRate?.usdToCad || 1.35);
            const frac = mps.length > 1 ? (isCA ? (sku.revenueCad || 0) / (totalRev || 1) : (sku.revenueUsd || 0) * (fxRate?.usdToCad || 1.35) / (totalRev || 1)) : 1;
            const unitsMp = sku.unitsCad != null
              ? (isCA ? sku.unitsCad : sku.unitsUsd)
              : Math.round((sku.units || 0) * frac);
            const revCad = isCA ? (sku.revenueCad || 0) : 0;
            const revUsd = isCA ? 0 : (sku.revenueUsd || 0);
            const rev = getNum(revCad, revUsd);
            const totalCogs = unitsMp * costPerUnit;
            const grossProfit = costPerUnit > 0 ? rev - totalCogs : null;
            const margin = grossProfit != null && rev > 0 ? (grossProfit / rev) * 100 : null;
            const inv = sku.inventory || {};
            const inventory = (inv.onHand ?? 0) + (inv.inbound ?? 0) + (inv.reserved ?? 0) + (inv.researching ?? 0) + (inv.unfulfillable ?? 0);
            skus.push({
              asin: sku.asin,
              sellerSku: sku.sellerSku || '',
              title: sku.title || brand.asinTitles?.[sku.asin] || sku.asin,
              brand: brand.name, brandId: brand.id, brandColor: brand.color, marketplace: mp,
              status: sku.status,
              units: unitsMp,
              revenueCad: revCad, revenueUsd: revUsd, revenue: rev,
              sessions: sku.sessions || 0,
              buyBox: sku.buyBox ?? null, cvr: sku.cvr ?? null,
              inventory, costPerUnit, totalCogs, grossProfit, margin,
              imageUrl: sku.imageUrl || null
            });
          }
        }
      }
      return skus;
    }

    function sortBy(col) {
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = -1; }
      productPage = 1;
      renderProductTable();
    }

    function sortBrandBy(col) {
      if (brandSortCol === col) brandSortDir *= -1;
      else { brandSortCol = col; brandSortDir = -1; }
      brandPage = 1;
      renderBrandTable();
    }

    function updateBrandSortIndicators() {
      document.querySelectorAll('.sort-brand-ind').forEach(el => {
        const col = el.dataset.col;
        el.textContent = col === brandSortCol ? (brandSortDir === -1 ? '↓' : '↑') : '';
      });
      document.querySelectorAll('.sortable-brand-th').forEach(th => {
        const col = th.querySelector('.sort-brand-ind')?.dataset.col;
        th.classList.toggle('text-white', col === brandSortCol);
        th.classList.toggle('text-slate-400', col !== brandSortCol);
      });
    }

    function setProductPage(p) { productPage = p; renderProductTable(); }
    function setBrandPage(p)   { brandPage   = p; renderBrandTable();   }
    function setPageSize(n) {
      pageSize = n;
      localStorage.setItem('pageSize', n);
      productPage = 1;
      brandPage = 1;
      renderProductTable();
      renderBrandTable();
    }

    function renderPaginationControls(containerId, currentPage, totalPages, onChangeFn) {
      const el = document.getElementById(containerId);
      if (!el) return;

      // Page number buttons
      let pageBtns = '';
      if (totalPages > 1) {
        const range = new Set([1, totalPages, currentPage - 1, currentPage, currentPage + 1].filter(p => p >= 1 && p <= totalPages));
        const pages = [...range].sort((a, b) => a - b);
        let prev = null;
        for (const p of pages) {
          if (prev !== null && p > prev + 1) pageBtns += `<span class="text-xs px-0.5" style="color:var(--text-3)">…</span>`;
          const active = p === currentPage;
          pageBtns += `<button onclick="${onChangeFn}(${p})" class="text-xs px-2.5 py-1 rounded transition-colors" style="${active ? 'background:var(--brand);color:#060d05;font-weight:600' : 'color:var(--text-2)'}">${p}</button>`;
          prev = p;
        }
      }

      const prevDis = currentPage <= 1;
      const nextDis = currentPage >= totalPages;
      const navStyle = (dis) => dis ? 'color:var(--text-3);cursor:not-allowed' : 'color:var(--text-2)';

      const sizeBtns = [10, 20, 50, 100].map(n =>
        `<button onclick="setPageSize(${n})" class="text-xs px-2 py-1 rounded transition-colors" style="${n === pageSize ? 'background:var(--brand-tint);color:var(--brand);font-weight:600' : 'color:var(--text-3)'}">${n}</button>`
      ).join('');

      el.innerHTML = `
        <div class="flex items-center justify-between px-5 py-3" style="border-top:1px solid var(--border)">
          <div class="flex items-center gap-1">
            ${totalPages > 1 ? `<button onclick="${onChangeFn}(${currentPage - 1})" ${prevDis ? 'disabled' : ''} class="text-xs px-2.5 py-1 rounded transition-colors" style="${navStyle(prevDis)}">← Prev</button>` : ''}
            ${pageBtns}
            ${totalPages > 1 ? `<button onclick="${onChangeFn}(${currentPage + 1})" ${nextDis ? 'disabled' : ''} class="text-xs px-2.5 py-1 rounded transition-colors" style="${navStyle(nextDis)}">Next →</button>` : ''}
          </div>
          <div class="flex items-center gap-1">
            <span class="text-xs mr-1" style="color:var(--text-3)">Rows:</span>
            ${sizeBtns}
          </div>
        </div>`;
    }

    function updateSortIndicators() {
      document.querySelectorAll('.sort-ind').forEach(el => {
        const col = el.dataset.col;
        el.textContent = col === sortCol ? (sortDir === -1 ? '↓' : '↑') : '';
      });
      document.querySelectorAll('.sortable-th').forEach(th => {
        const col = th.querySelector('.sort-ind')?.dataset.col;
        th.classList.toggle('text-white', col === sortCol);
        th.classList.toggle('text-slate-400', col !== sortCol);
      });
    }

    function renderProductTable() {
      const tbody = document.getElementById('productTableBody');
      const skus = getAllSkus(activeBrandPreset);

      if (!skus.length) {
        tbody.innerHTML = '<tr><td colspan="10" class="text-center text-slate-500 py-8">No data — run sync first</td></tr>';
        document.getElementById('productPagination').innerHTML = '';
        updateSortIndicators();
        return;
      }

      const sorted = [...skus].sort((a, b) => {
        const av = a[sortCol] ?? -Infinity;
        const bv = b[sortCol] ?? -Infinity;
        return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
      });

      const totalPages = Math.ceil(sorted.length / pageSize);
      if (productPage > totalPages) productPage = totalPages;
      const paginated = sorted.slice((productPage - 1) * pageSize, productPage * pageSize);

      const sym = currency === 'CAD' ? 'CA$' : 'US$';
      const fmtN = v => v != null ? sym + Math.abs(v).toLocaleString(currency === 'CAD' ? 'en-CA' : 'en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';

      tbody.innerHTML = paginated.map(s => {
        const statusColor = s.status === 'active' ? 'text-emerald-400' : s.status === 'inactive' ? 'text-red-400' : 'text-slate-500';
        const gpColor = s.grossProfit == null ? 'text-slate-600' : s.grossProfit >= 0 ? 'text-emerald-400' : 'text-red-400';
        const marginColor = s.margin == null ? 'text-slate-600' : s.margin >= 0 ? 'text-emerald-400' : 'text-red-400';
        const bbColor = s.buyBox == null ? 'text-slate-600' : s.buyBox >= 90 ? 'text-emerald-400' : s.buyBox >= 70 ? 'text-amber-400' : 'text-red-400';

        return `<tr class="cursor-pointer" onclick="location.href='/brand.html?id=${s.brandId}'">
          <td class="px-4 py-2.5">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded bg-slate-700 flex-shrink-0 relative flex items-center justify-center">
                <div class="w-1.5 h-1.5 rounded-full" style="background:${s.brandColor}"></div>
                ${s.imageUrl ? `<img src="${s.imageUrl}" loading="lazy" onerror="this.style.display='none'" class="w-9 h-9 object-contain rounded absolute inset-0" />` : ''}
              </div>
              <div class="min-w-0">
                <div class="flex items-center gap-2">
                  <a href="${s.marketplace === 'US' ? 'https://www.amazon.com' : 'https://www.amazon.ca'}/dp/${s.asin}" target="_blank" rel="noopener" class="font-mono text-slate-400 text-xs hover:underline">${s.asin}</a>
                  ${mpBadge(s.marketplace)}
                  ${s.sellerSku ? `<a href="${s.marketplace === 'US' ? 'https://sellercentral.amazon.com' : 'https://sellercentral.amazon.ca'}/inventory?searchSKU=${encodeURIComponent(s.sellerSku)}" target="_blank" rel="noopener" class="font-mono text-slate-500 text-xs truncate max-w-[160px] hover:underline" title="${s.sellerSku}">${s.sellerSku}</a>` : ''}
                </div>
                <div class="text-slate-200 text-xs mt-0.5 max-w-xs truncate">${s.title}</div>
                <div class="flex items-center gap-2 mt-0.5">
                  <span class="text-slate-500 text-xs">${s.brand}</span>
                  <span class="${statusColor} text-xs">${s.status || '—'}</span>
                </div>
              </div>
            </div>
          </td>
          <td class="px-4 py-3 text-right text-slate-300">${s.units.toLocaleString()}</td>
          <td class="px-4 py-3 text-right text-slate-200 font-medium">${fmtN(s.revenue)}</td>
          <td class="px-4 py-3 text-right text-slate-400">${s.cvr != null ? s.cvr.toFixed(2) + '%' : '—'}</td>
          <td class="px-4 py-3 text-right ${bbColor}">${s.buyBox != null ? s.buyBox.toFixed(1) + '%' : '—'}</td>
          <td class="px-4 py-3 text-right text-slate-400">${s.inventory.toLocaleString()}</td>
          <td class="px-4 py-3 text-right ${s.costPerUnit > 0 ? 'text-slate-400' : 'text-slate-600'}">${s.costPerUnit > 0 ? fmtN(s.costPerUnit) : '—'}</td>
          <td class="px-4 py-3 text-right ${s.totalCogs > 0 ? 'text-slate-400' : 'text-slate-600'}">${s.costPerUnit > 0 ? fmtN(s.totalCogs) : '—'}</td>
          <td class="px-4 py-3 text-right ${gpColor} font-medium">${s.grossProfit != null ? (s.grossProfit < 0 ? '-' : '') + fmtN(s.grossProfit) : '—'}</td>
          <td class="px-4 py-3 text-right ${marginColor}">${s.margin != null ? s.margin.toFixed(1) + '%' : '—'}</td>
        </tr>`;
      }).join('');

      renderPaginationControls('productPagination', productPage, totalPages, 'setProductPage');
      updateSortIndicators();
    }

    // ── Brand table ───────────────────────────────────────────────────────────
    function setBrandPreset(key) {
      activeBrandPreset = key;
      localStorage.setItem('brandPreset', key);
      document.querySelectorAll('.bp-btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === `bp-${key}`);
      });
      productPage = 1;
      brandPage = 1;
      renderBrandTable();
      renderProductTable();
    }

    function renderBrandTable() {
      const preset = presetMetrics.presets?.[activeBrandPreset];
      const tbody = document.getElementById('brandTableBody');

      if (!brandsData.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-slate-500 py-8">No brands — <a href="/admin.html" class="text-indigo-400">add one</a></td></tr>';
        document.getElementById('brandPagination').innerHTML = '';
        updateBrandSortIndicators();
        return;
      }

      const brandItems = brandsData.map(brand => {
        const bm = preset?.brands?.[brand.id];
        const s = bm?.summary;
        let rev = 0, cogsNum = 0, grossProfit = 0, margin = null, units = 0, sessions = 0, buyBox = null, cogs = { cad: 0, usd: 0 };
        if (s) {
          cogs = calcBrandCogs(brand, activeBrandPreset);
          rev = getNum(s.revenueCad, s.revenueUsd);
          cogsNum = getNum(cogs.cad, cogs.usd);
          grossProfit = rev - cogsNum;
          margin = rev > 0 && cogsNum > 0 ? (grossProfit / rev) * 100 : null;
          units = s.units || 0;
          sessions = s.sessions || 0;
          buyBox = s.buyBox ?? null;
        }
        return { brand, s, rev, cogs, cogsNum, grossProfit, margin, units, sessions, buyBox };
      });

      brandItems.sort((a, b) => {
        let av = { name: a.brand.name, revenue: a.rev, units: a.units, cogs: a.cogsNum, grossProfit: a.grossProfit, margin: a.margin, sessions: a.sessions, buyBox: a.buyBox }[brandSortCol];
        let bv = { name: b.brand.name, revenue: b.rev, units: b.units, cogs: b.cogsNum, grossProfit: b.grossProfit, margin: b.margin, sessions: b.sessions, buyBox: b.buyBox }[brandSortCol];
        if (typeof av === 'string') return brandSortDir * av.localeCompare(bv || '');
        av = av ?? -Infinity; bv = bv ?? -Infinity;
        return brandSortDir * (av < bv ? -1 : av > bv ? 1 : 0);
      });

      const brandTotalPages = Math.ceil(brandItems.length / pageSize);
      if (brandPage > brandTotalPages) brandPage = brandTotalPages;
      const paginatedBrands = brandItems.slice((brandPage - 1) * pageSize, brandPage * pageSize);

      tbody.innerHTML = paginatedBrands.map(({ brand, s, rev, cogs, cogsNum, grossProfit, margin, sessions, buyBox }) => {
        if (!s) {
          return `<tr class="cursor-pointer" onclick="location.href='/brand.html?id=${brand.id}'">
            <td class="px-5 py-3">
              <div class="flex items-center gap-2.5">
                <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${brand.color}"></div>
                <span class="font-medium text-slate-200 text-xs">${brand.name}</span>
                <span class="text-slate-600 text-xs">${brand.marketplace}</span>
              </div>
            </td>
            <td colspan="7" class="px-4 py-3 text-slate-600 text-center">No data</td>
          </tr>`;
        }

        const profitColor = grossProfit > 0 ? 'text-emerald-400' : grossProfit < 0 ? 'text-red-400' : 'text-slate-400';

        return `<tr class="brand-row border-b border-slate-800 cursor-pointer" onclick="location.href='/brand.html?id=${brand.id}'">
          <td class="px-5 py-3">
            <div class="flex items-center gap-2.5">
              <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${brand.color}"></div>
              <span class="font-medium text-slate-200 text-xs">${brand.name}</span>
              <span class="text-slate-600 text-xs">${brand.marketplace} · ${brand.asins.length} ASINs</span>
            </div>
          </td>
          <td class="px-4 py-3 text-right text-slate-200 font-medium">${fmtMoney(s.revenueCad, s.revenueUsd)}</td>
          <td class="px-4 py-3 text-right text-slate-400">${(s.units || 0).toLocaleString()}</td>
          <td class="px-4 py-3 text-right ${cogsNum > 0 ? 'text-slate-400' : 'text-slate-600'}">${cogsNum > 0 ? fmtMoney(cogs.cad, cogs.usd) : '—'}</td>
          <td class="px-4 py-3 text-right ${profitColor} font-medium">${cogsNum > 0 ? fmtMoney(grossProfit, 0) : '—'}</td>
          <td class="px-4 py-3 text-right ${margin != null ? (margin > 0 ? 'text-emerald-400' : 'text-red-400') : 'text-slate-600'}">${margin != null ? margin.toFixed(1) + '%' : '—'}</td>
          <td class="px-4 py-3 text-right text-slate-400">${(s.sessions || 0).toLocaleString()}</td>
          <td class="px-4 py-3 text-right ${buyBox >= 90 ? 'text-emerald-400' : buyBox >= 70 ? 'text-amber-400' : buyBox != null ? 'text-red-400' : 'text-slate-600'}">${buyBox != null ? buyBox.toFixed(1) + '%' : '—'}</td>
        </tr>`;
      }).join('');

      renderPaginationControls('brandPagination', brandPage, brandTotalPages, 'setBrandPage');
      updateBrandSortIndicators();
    }

    function calcBrandCogs(brand, presetKey) {
      let cad = 0, usd = 0;
      const bm = presetMetrics.presets?.[presetKey]?.brands?.[brand.id];
      if (!bm?.skus) return { cad: 0, usd: 0 };
      for (const sku of bm.skus) {
        const cogsCA = brand.cogsPerMarketplace?.[sku.asin]?.CA ?? (brand.marketplace !== 'US' ? brand.cogs?.[sku.asin] : null) ?? 0;
        const cogsUS = brand.cogsPerMarketplace?.[sku.asin]?.US ?? (brand.marketplace === 'US' ? brand.cogs?.[sku.asin] : null) ?? 0;
        const unitsCa = sku.unitsCad != null ? sku.unitsCad : (brand.marketplace !== 'US' ? sku.units : 0);
        const unitsUs = sku.unitsUsd != null ? sku.unitsUsd : (brand.marketplace === 'US' ? sku.units : 0);
        cad += unitsCa * cogsCA;
        usd += unitsUs * cogsUS;
      }
      return { cad: Math.round(cad * 100) / 100, usd: Math.round(usd * 100) / 100 };
    }

    // ── Currency ──────────────────────────────────────────────────────────────
    function updateToggleUI() {
      document.getElementById('toggleCAD').classList.toggle('active', currency === 'CAD');
      document.getElementById('toggleUSD').classList.toggle('active', currency === 'USD');
    }

    function setCurrency(c) {
      currency = c;
      localStorage.setItem('currency', c);
      updateToggleUI();
      renderTiles();
      renderBrandTable();
      renderProductTable();
    }

    // ── Sync ──────────────────────────────────────────────────────────────────
    async function triggerSync() {
      const btn = document.getElementById('syncBtn');
      btn.disabled = true;
      btn.textContent = 'Starting...';

      try {
        const res = await fetch('/api/sync', { method: 'POST' });
        const data = await res.json();
        if (!data.success) {
          alert(data.message);
          btn.disabled = false;
          btn.textContent = 'Sync Data';
          return;
        }
      } catch (e) {
        alert('Sync failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Sync Data';
        return;
      }

      document.getElementById('syncBar').classList.remove('hidden');
      btn.textContent = 'Syncing...';

      const poll = setInterval(async () => {
        try {
          const s = await fetch('/api/sync/status').then(r => r.json());
          if (s.status === 'done') {
            clearInterval(poll);
            document.getElementById('syncBar').classList.add('hidden');
            btn.disabled = false;
            btn.textContent = 'Sync Data';
            await loadDashboard();
            notifyUser('Sync complete', 'Dashboard data has been updated.');
          } else if (s.status === 'error') {
            clearInterval(poll);
            document.getElementById('syncBar').classList.add('hidden');
            notifyUser('Sync failed', s.error || 'Unknown error');
            btn.disabled = false;
            btn.textContent = 'Sync Data';
          }
        } catch (e) {
          clearInterval(poll);
          document.getElementById('syncBar').classList.add('hidden');
          btn.disabled = false;
          btn.textContent = 'Sync Data';
        }
      }, 5000);
    }

    // ── Notifications ─────────────────────────────────────────────────────────
    function notifyUser(title, body) {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: '/favicon.ico' });
      }
    }

    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    async function loadDashboard() {
      try {
        const [brandsRes, pmRes, fxRes] = await Promise.all([
          fetch('/api/brands').then(r => r.json()),
          fetch('/api/preset-metrics').then(r => r.json()),
          fetch('/api/fx').then(r => r.json())
        ]);

        fxRate = fxRes;
        presetMetrics = pmRes;
        brandsData = (brandsRes.brands || []).sort((a, b) => {
          if (a.id === 'unknown-brand') return 1;
          if (b.id === 'unknown-brand') return -1;
          return a.name.localeCompare(b.name);
        });

        if (brandsRes.lastSync) {
          document.getElementById('lastSyncText').textContent =
            'Synced ' + new Date(brandsRes.lastSync).toLocaleString();
        }

        // Validate active brand preset still exists
        const available = Object.keys(presetMetrics.presets || {});
        if (!available.includes(activeBrandPreset) && available.length > 0) {
          activeBrandPreset = available[0];
        }

        updateToggleUI();
        setTableView(activeTableView);
        renderTiles();
        setBrandPreset(activeBrandPreset);
      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    loadDashboard();

    // On load, check if a sync is already running (e.g. triggered server-side or via API)
    (async function checkSyncOnLoad() {
      try {
        const s = await fetch('/api/sync/status').then(r => r.json());
        if (s.status !== 'syncing') return;

        const btn = document.getElementById('syncBtn');
        btn.disabled = true;
        btn.textContent = 'Syncing...';
        document.getElementById('syncBar').classList.remove('hidden');

        const poll = setInterval(async () => {
          try {
            const s2 = await fetch('/api/sync/status').then(r => r.json());
            if (s2.status === 'done') {
              clearInterval(poll);
              document.getElementById('syncBar').classList.add('hidden');
              btn.disabled = false;
              btn.textContent = 'Sync Data';
              await loadDashboard();
            } else if (s2.status === 'error') {
              clearInterval(poll);
              document.getElementById('syncBar').classList.add('hidden');
              btn.disabled = false;
              btn.textContent = 'Sync Data';
            }
          } catch { clearInterval(poll); }
        }, 5000);
      } catch {}
    })();
  </script>
