<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMC Brand Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
    .tile-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 1100px) { .tile-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .tile-row { grid-template-columns: 1fr; } }
    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .metric-row .label { color: #94a3b8; font-size: 12px; }
    .metric-row .value { font-size: 13px; font-weight: 500; color: #f1f5f9; }
    .metric-row .value.pos { color: #34d399; }
    .metric-row .value.neg { color: #f87171; }
    .metric-row .value.dim { color: #64748b; }
    .divider { border-top: 1px solid #334155; margin: 6px 0; }
    .profit-row .label { color: #cbd5e1; font-size: 13px; font-weight: 500; }
    .profit-row .value { font-size: 14px; font-weight: 700; }
    .more-section { border-top: 1px solid #334155; margin-top: 8px; padding-top: 8px; }
    .brand-row:hover { background: #1e293b; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="bg-slate-900 border-b border-slate-700 sticky top-0 z-20">
    <div class="max-w-screen-xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <span class="font-bold text-white text-sm tracking-tight">RMC Dashboard</span>
        <div class="flex gap-1">
          <a href="/" class="px-3 py-1.5 text-sm font-medium text-white bg-slate-700 rounded-md">Dashboard</a>
          <a href="/brands.html" class="px-3 py-1.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700 rounded-md transition-colors">Brands</a>
          <a href="/admin.html" class="px-3 py-1.5 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-700 rounded-md transition-colors">ASIN Mapping</a>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-0.5 bg-slate-800 rounded-lg p-0.5">
          <button id="toggleCAD" onclick="setCurrency('CAD')"
            class="text-xs px-3 py-1 rounded-md font-medium transition-colors">CA$</button>
          <button id="toggleUSD" onclick="setCurrency('USD')"
            class="text-xs px-3 py-1 rounded-md font-medium transition-colors">US$</button>
        </div>
        <span id="lastSyncText" class="text-xs text-slate-500 hidden md:inline"></span>
        <button id="syncBtn" onclick="triggerSync()"
          class="text-sm px-3 py-1.5 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-500 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          Sync Data
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-screen-xl mx-auto px-6 py-6">

    <!-- Sync status bar -->
    <div id="syncBar" class="hidden mb-4 bg-indigo-900/50 border border-indigo-700 rounded-lg px-4 py-2.5 flex items-center gap-3">
      <div class="w-3 h-3 rounded-full bg-indigo-400 animate-pulse flex-shrink-0"></div>
      <span class="text-sm text-indigo-200">Sync in progress — this takes 5–10 minutes. You can keep using the dashboard.</span>
    </div>

    <!-- Other expenses input -->
    <div class="flex items-center justify-end gap-3 mb-5">
      <label class="text-xs text-slate-500">Other expenses (monthly):</label>
      <div class="relative">
        <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 text-xs" id="expCurrencySymbol">CA$</span>
        <input type="number" id="otherExpenses" min="0" step="0.01" placeholder="0.00"
          class="bg-slate-800 border border-slate-600 text-white text-xs rounded-md pl-8 pr-3 py-1.5 w-28 focus:outline-none focus:border-indigo-500"
          oninput="saveExpenses(); renderTiles()" />
      </div>
    </div>

    <!-- 4 Tiles -->
    <div class="tile-row mb-8" id="tilesRow">
      <!-- Rendered by JS -->
    </div>

    <!-- Brands summary table -->
    <div class="bg-slate-900 rounded-xl border border-slate-700 overflow-hidden">
      <div class="px-5 py-3 border-b border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <h2 class="text-sm font-semibold text-white">Brands</h2>
          <div class="flex gap-1">
            <button onclick="setBrandPreset('yesterday')" id="bp-yesterday" class="bp-btn text-xs px-2.5 py-1 rounded-md border border-slate-600 text-slate-400 hover:text-white hover:border-slate-400 transition-colors">Yesterday</button>
            <button onclick="setBrandPreset('last30d')"   id="bp-last30d"   class="bp-btn text-xs px-2.5 py-1 rounded-md border border-slate-600 text-slate-400 hover:text-white hover:border-slate-400 transition-colors">Last 30d</button>
            <button onclick="setBrandPreset('thisMonth')" id="bp-thisMonth" class="bp-btn text-xs px-2.5 py-1 rounded-md border border-slate-600 text-slate-400 hover:text-white hover:border-slate-400 transition-colors">This Month</button>
            <button onclick="setBrandPreset('lastMonth')" id="bp-lastMonth" class="bp-btn text-xs px-2.5 py-1 rounded-md border border-slate-600 text-slate-400 hover:text-white hover:border-slate-400 transition-colors">Last Month</button>
          </div>
        </div>
        <a href="/admin.html" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium">+ Add brand</a>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead>
            <tr class="border-b border-slate-700">
              <th class="text-left px-5 py-2.5 text-slate-400 font-medium">Brand</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">Revenue</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">Units</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">COGS</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">Gross Profit</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">Margin</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">Sessions</th>
              <th class="text-right px-4 py-2.5 text-slate-400 font-medium">Buy Box</th>
            </tr>
          </thead>
          <tbody id="brandTableBody">
            <tr><td colspan="8" class="text-center text-slate-500 py-8">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────────────────
    let brandsData = [];
    let presetMetrics = {};
    let currency = localStorage.getItem('currency') || 'CAD';
    let fxRate = { usdToCad: 1.38, cadToUsd: 0.724 };
    let activeBrandPreset = localStorage.getItem('brandPreset') || 'last30d';
    let expandedTiles = {};

    const TILE_CONFIG = [
      { key: 'yesterday', label: 'Yesterday',    color: 'from-blue-700 to-blue-800',    accent: '#3b82f6' },
      { key: 'last30d',   label: 'Last 30 Days', color: 'from-violet-700 to-violet-800', accent: '#7c3aed' },
      { key: 'thisMonth', label: 'This Month',   color: 'from-teal-700 to-teal-800',    accent: '#0d9488' },
      { key: 'lastMonth', label: 'Last Month',   color: 'from-emerald-700 to-emerald-800', accent: '#059669' }
    ];

    // ── Formatting ────────────────────────────────────────────────────────────
    function fmtMoney(cad, usd = 0) {
      if (currency === 'CAD') {
        const t = (cad || 0) + (usd || 0) * fxRate.usdToCad;
        return 'CA$' + t.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      const t = (usd || 0) + (cad || 0) * fxRate.cadToUsd;
      return 'US$' + t.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(val) {
      return val != null ? val.toFixed(2) + '%' : '—';
    }

    function getNum(cad, usd = 0) {
      if (currency === 'CAD') return (cad || 0) + (usd || 0) * fxRate.usdToCad;
      return (usd || 0) + (cad || 0) * fxRate.cadToUsd;
    }

    // ── Other expenses ────────────────────────────────────────────────────────
    function loadExpenses() {
      const v = localStorage.getItem('otherExpensesMonthly');
      document.getElementById('otherExpenses').value = v || '';
    }

    function saveExpenses() {
      localStorage.setItem('otherExpensesMonthly', document.getElementById('otherExpenses').value || '0');
    }

    function getOtherExpenses(presetKey) {
      const monthly = parseFloat(localStorage.getItem('otherExpensesMonthly') || '0') || 0;
      if (!monthly) return 0;
      const preset = presetMetrics.presets?.[presetKey];
      if (!preset) return monthly;
      const days = Math.max(1, Math.round((new Date(preset.endDate) - new Date(preset.startDate)) / 86400000) + 1);
      // In selected currency already (user enters in selected currency)
      return (monthly / 30) * days;
    }

    // ── COGS calculation ──────────────────────────────────────────────────────
    function calcCogs(presetKey) {
      let cad = 0, usd = 0;
      for (const brand of brandsData) {
        const bm = presetMetrics.presets?.[presetKey]?.brands?.[brand.id];
        if (!bm?.skus) continue;
        const isCA = brand.marketplace !== 'US';
        for (const sku of bm.skus) {
          const cost = brand.cogs?.[sku.asin] || 0;
          if (isCA) cad += (sku.units || 0) * cost;
          else usd += (sku.units || 0) * cost;
        }
      }
      return { cad: Math.round(cad * 100) / 100, usd: Math.round(usd * 100) / 100 };
    }

    // ── Tile metrics ──────────────────────────────────────────────────────────
    function getTileMetrics(presetKey) {
      const preset = presetMetrics.presets?.[presetKey];
      if (!preset) return null;

      // Aggregate across all brands
      let revCad = 0, revUsd = 0, units = 0, sessions = 0, refundUnits = 0;
      for (const bm of Object.values(preset.brands || {})) {
        revCad += bm.summary?.revenueCad || 0;
        revUsd += bm.summary?.revenueUsd || 0;
        units  += bm.summary?.units || 0;
        sessions += bm.summary?.sessions || 0;
      }

      const fin = preset.financials || {};
      const fCad = fin.CAD || {};
      const fUsd = fin.USD || {};

      const cogs = calcCogs(presetKey);
      const otherExp = getOtherExpenses(presetKey);

      // All figures in selected display currency
      const sales     = getNum(revCad, revUsd);
      const amzFees   = getNum(fCad.amazonFees, fUsd.amazonFees);
      const refunds   = getNum(fCad.refundAmount, fUsd.refundAmount);
      const refundFee = getNum(fCad.refundFees, fUsd.refundFees);
      const adSpend   = getNum(fCad.adSpend, fUsd.adSpend);
      const cogsTotal = getNum(cogs.cad, cogs.usd);

      const grossProfit = sales - cogsTotal - amzFees - refunds - refundFee - adSpend;
      const netProfit   = grossProfit - otherExp;
      const estPayout   = sales - amzFees - adSpend - refunds;
      const margin      = sales > 0 ? (netProfit / sales) * 100 : null;
      const roi         = cogsTotal > 0 ? (netProfit / cogsTotal) * 100 : null;
      const realAcos    = sales > 0 ? (adSpend / sales) * 100 : null;
      const pctRefunds  = sales > 0 ? (refunds / sales) * 100 : null;

      const fmtC = v => {
        const sym = currency === 'CAD' ? 'CA$' : 'US$';
        return sym + Math.abs(v).toLocaleString(currency === 'CAD' ? 'en-CA' : 'en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      };

      return {
        sales, units, sessions, amzFees, refunds, refundFee, adSpend,
        cogsTotal, grossProfit, netProfit, estPayout, margin, roi,
        realAcos, pctRefunds, otherExp,
        startDate: preset.startDate, endDate: preset.endDate,
        fmtC
      };
    }

    // ── Tile rendering ────────────────────────────────────────────────────────
    function renderTiles() {
      const container = document.getElementById('tilesRow');
      container.innerHTML = TILE_CONFIG.map(tc => buildTile(tc)).join('');
      updateExpCurrencySymbol();
    }

    function buildTile({ key, label, color }) {
      const m = getTileMetrics(key);
      const preset = presetMetrics.presets?.[key];
      const isExpanded = expandedTiles[key];

      const fmtD = d => d ? new Date(d + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
      const dateStr = preset
        ? (preset.startDate === preset.endDate ? fmtD(preset.startDate) : `${fmtD(preset.startDate)} – ${fmtD(preset.endDate)}`)
        : '—';

      if (!m) {
        return `<div class="rounded-xl overflow-hidden">
          <div class="bg-gradient-to-b ${color} px-4 py-3">
            <div class="text-white font-semibold text-sm">${label}</div>
            <div class="text-white/50 text-xs mt-0.5">${dateStr}</div>
          </div>
          <div class="bg-slate-800 px-4 py-6 text-center">
            <p class="text-slate-500 text-xs">No data — run sync</p>
          </div>
        </div>`;
      }

      const { fmtC } = m;
      const profitClass = m.netProfit >= 0 ? 'pos' : 'neg';
      const sym = currency === 'CAD' ? 'CA$' : 'US$';

      const moreRows = `
        <div class="more-section space-y-0.5">
          <div class="metric-row"><span class="label">Refund cost</span><span class="value neg">-${fmtC(m.refundFee)}</span></div>
          <div class="metric-row"><span class="label">Amazon fees</span><span class="value neg">-${fmtC(m.amzFees)}</span></div>
          <div class="metric-row"><span class="label">Cost of goods</span><span class="value ${m.cogsTotal > 0 ? 'neg' : 'dim'}">-${fmtC(m.cogsTotal)}</span></div>
          <div class="metric-row"><span class="label">Other expenses</span><span class="value ${m.otherExp > 0 ? 'neg' : 'dim'}">-${fmtC(m.otherExp)}</span></div>
          <div class="divider"></div>
          <div class="metric-row"><span class="label">Real ACOS</span><span class="value">${fmtPct(m.realAcos)}</span></div>
          <div class="metric-row"><span class="label">% Refunds</span><span class="value">${fmtPct(m.pctRefunds)}</span></div>
          <div class="metric-row"><span class="label">Margin</span><span class="value ${profitClass}">${fmtPct(m.margin)}</span></div>
          <div class="metric-row"><span class="label">ROI</span><span class="value ${profitClass}">${m.roi != null ? m.roi.toFixed(1) + '%' : m.cogsTotal === 0 ? '<span class=\'dim text-xs\'>Enter COGS</span>' : '—'}</span></div>
          <div class="metric-row"><span class="label">Sessions</span><span class="value">${m.sessions.toLocaleString()}</span></div>
        </div>`;

      return `
        <div class="rounded-xl overflow-hidden shadow-lg">
          <div class="bg-gradient-to-b ${color} px-4 py-3">
            <div class="text-white font-semibold text-sm">${label}</div>
            <div class="text-white/60 text-xs mt-0.5">${dateStr}</div>
          </div>
          <div class="bg-slate-800 px-4 py-3 space-y-0.5">
            <div class="metric-row"><span class="label">Sales</span><span class="value">${fmtC(m.sales)}</span></div>
            <div class="metric-row"><span class="label">Orders / Units</span><span class="value">${m.units.toLocaleString()}</span></div>
            <div class="metric-row"><span class="label">Refunds</span><span class="value ${m.refunds > 0 ? 'neg' : 'dim'}">-${fmtC(m.refunds)}</span></div>
            <div class="metric-row"><span class="label">Adv. cost</span><span class="value ${m.adSpend > 0 ? 'neg' : 'dim'}">-${fmtC(m.adSpend)}</span></div>
            <div class="metric-row"><span class="label">Est. payout</span><span class="value">${fmtC(m.estPayout)}</span></div>
            <div class="divider"></div>
            <div class="metric-row profit-row"><span class="label">Gross profit</span><span class="value ${profitClass}">${m.grossProfit < 0 ? '-' : ''}${fmtC(Math.abs(m.grossProfit))}</span></div>
            <div class="metric-row profit-row"><span class="label">Net profit</span><span class="value ${profitClass}">${m.netProfit < 0 ? '-' : ''}${fmtC(Math.abs(m.netProfit))}</span></div>
            ${isExpanded ? moreRows : ''}
            <button onclick="toggleTile('${key}')"
              class="w-full text-center text-slate-500 text-xs pt-2 hover:text-slate-300 transition-colors">
              ${isExpanded ? '▲ Less' : '▼ More'}
            </button>
          </div>
        </div>`;
    }

    function toggleTile(key) {
      expandedTiles[key] = !expandedTiles[key];
      renderTiles();
    }

    // ── Brand table ───────────────────────────────────────────────────────────
    function setBrandPreset(key) {
      activeBrandPreset = key;
      localStorage.setItem('brandPreset', key);
      document.querySelectorAll('.bp-btn').forEach(btn => {
        const active = btn.id === `bp-${key}`;
        btn.classList.toggle('bg-slate-700', active);
        btn.classList.toggle('text-white', active);
        btn.classList.toggle('border-slate-500', active);
        btn.classList.toggle('text-slate-400', !active);
        btn.classList.toggle('border-slate-600', !active);
      });
      renderBrandTable();
    }

    function renderBrandTable() {
      const preset = presetMetrics.presets?.[activeBrandPreset];
      const tbody = document.getElementById('brandTableBody');

      if (!brandsData.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-slate-500 py-8">No brands — <a href="/admin.html" class="text-indigo-400">add one</a></td></tr>';
        return;
      }

      const rows = brandsData.map(brand => {
        const bm = preset?.brands?.[brand.id];
        const s = bm?.summary;
        if (!s) {
          return `<tr class="brand-row border-b border-slate-800 cursor-pointer" onclick="location.href='/brand.html?id=${brand.id}'">
            <td class="px-5 py-3">
              <div class="flex items-center gap-2.5">
                <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${brand.color}"></div>
                <span class="font-medium text-slate-200 text-xs">${brand.name}</span>
                <span class="text-slate-600 text-xs">${brand.marketplace}</span>
              </div>
            </td>
            <td colspan="7" class="px-4 py-3 text-slate-600 text-center">No data</td>
          </tr>`;
        }

        const cogs = calcBrandCogs(brand, activeBrandPreset);
        const rev = getNum(s.revenueCad, s.revenueUsd);
        const cogsNum = getNum(cogs.cad, cogs.usd);
        const grossProfit = rev - cogsNum;
        const margin = rev > 0 && cogsNum > 0 ? (grossProfit / rev) * 100 : null;

        const profitColor = grossProfit > 0 ? 'text-emerald-400' : grossProfit < 0 ? 'text-red-400' : 'text-slate-400';

        return `<tr class="brand-row border-b border-slate-800 cursor-pointer" onclick="location.href='/brand.html?id=${brand.id}'">
          <td class="px-5 py-3">
            <div class="flex items-center gap-2.5">
              <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${brand.color}"></div>
              <span class="font-medium text-slate-200 text-xs">${brand.name}</span>
              <span class="text-slate-600 text-xs">${brand.marketplace} · ${brand.asins.length} ASINs</span>
            </div>
          </td>
          <td class="px-4 py-3 text-right text-slate-200 font-medium">${fmtMoney(s.revenueCad, s.revenueUsd)}</td>
          <td class="px-4 py-3 text-right text-slate-400">${(s.units || 0).toLocaleString()}</td>
          <td class="px-4 py-3 text-right ${cogsNum > 0 ? 'text-slate-400' : 'text-slate-600'}">${cogsNum > 0 ? fmtMoney(cogs.cad, cogs.usd) : '—'}</td>
          <td class="px-4 py-3 text-right ${profitColor} font-medium">${cogsNum > 0 ? fmtMoney(grossProfit, 0) : '—'}</td>
          <td class="px-4 py-3 text-right ${margin != null ? (margin > 0 ? 'text-emerald-400' : 'text-red-400') : 'text-slate-600'}">${margin != null ? margin.toFixed(1) + '%' : '—'}</td>
          <td class="px-4 py-3 text-right text-slate-400">${(s.sessions || 0).toLocaleString()}</td>
          <td class="px-4 py-3 text-right ${s.buyBox >= 90 ? 'text-emerald-400' : s.buyBox >= 70 ? 'text-amber-400' : s.buyBox != null ? 'text-red-400' : 'text-slate-600'}">${s.buyBox != null ? s.buyBox.toFixed(1) + '%' : '—'}</td>
        </tr>`;
      });

      tbody.innerHTML = rows.join('');
    }

    function calcBrandCogs(brand, presetKey) {
      let cad = 0, usd = 0;
      const bm = presetMetrics.presets?.[presetKey]?.brands?.[brand.id];
      if (!bm?.skus) return { cad: 0, usd: 0 };
      const isCA = brand.marketplace !== 'US';
      for (const sku of bm.skus) {
        const cost = brand.cogs?.[sku.asin] || 0;
        if (isCA) cad += (sku.units || 0) * cost;
        else usd += (sku.units || 0) * cost;
      }
      return { cad: Math.round(cad * 100) / 100, usd: Math.round(usd * 100) / 100 };
    }

    // ── Currency ──────────────────────────────────────────────────────────────
    function updateToggleUI() {
      const active = 'text-xs px-3 py-1 rounded-md font-medium bg-white text-slate-900 shadow-sm';
      const inactive = 'text-xs px-3 py-1 rounded-md font-medium text-slate-400 hover:text-white';
      document.getElementById('toggleCAD').className = currency === 'CAD' ? active : inactive;
      document.getElementById('toggleUSD').className = currency === 'USD' ? active : inactive;
    }

    function setCurrency(c) {
      currency = c;
      localStorage.setItem('currency', c);
      updateToggleUI();
      updateExpCurrencySymbol();
      renderTiles();
      renderBrandTable();
    }

    function updateExpCurrencySymbol() {
      document.getElementById('expCurrencySymbol').textContent = currency === 'CAD' ? 'CA$' : 'US$';
    }

    // ── Sync ──────────────────────────────────────────────────────────────────
    async function triggerSync() {
      const btn = document.getElementById('syncBtn');
      btn.disabled = true;
      btn.textContent = 'Starting...';

      try {
        const res = await fetch('/api/sync', { method: 'POST' });
        const data = await res.json();
        if (!data.success) {
          alert(data.message);
          btn.disabled = false;
          btn.textContent = 'Sync Data';
          return;
        }
      } catch (e) {
        alert('Sync failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Sync Data';
        return;
      }

      document.getElementById('syncBar').classList.remove('hidden');
      btn.textContent = 'Syncing...';

      const poll = setInterval(async () => {
        try {
          const s = await fetch('/api/sync/status').then(r => r.json());
          if (s.status === 'done') {
            clearInterval(poll);
            document.getElementById('syncBar').classList.add('hidden');
            btn.disabled = false;
            btn.textContent = 'Sync Data';
            await loadDashboard();
          } else if (s.status === 'error') {
            clearInterval(poll);
            document.getElementById('syncBar').classList.add('hidden');
            alert('Sync error: ' + s.error);
            btn.disabled = false;
            btn.textContent = 'Sync Data';
          }
        } catch (e) {
          clearInterval(poll);
          document.getElementById('syncBar').classList.add('hidden');
          btn.disabled = false;
          btn.textContent = 'Sync Data';
        }
      }, 5000);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    async function loadDashboard() {
      try {
        const [brandsRes, pmRes, fxRes] = await Promise.all([
          fetch('/api/brands').then(r => r.json()),
          fetch('/api/preset-metrics').then(r => r.json()),
          fetch('/api/fx').then(r => r.json())
        ]);

        fxRate = fxRes;
        presetMetrics = pmRes;
        brandsData = brandsRes.brands || [];

        if (brandsRes.lastSync) {
          document.getElementById('lastSyncText').textContent =
            'Synced ' + new Date(brandsRes.lastSync).toLocaleString();
        }

        // Validate active brand preset still exists
        const available = Object.keys(presetMetrics.presets || {});
        if (!available.includes(activeBrandPreset) && available.length > 0) {
          activeBrandPreset = available[0];
        }

        updateToggleUI();
        updateExpCurrencySymbol();
        renderTiles();
        setBrandPreset(activeBrandPreset);
      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    loadExpenses();
    loadDashboard();
  </script>
</body>
</html>
