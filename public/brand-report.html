<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMC Brand Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #537D30; --green-lt: #EBF1E4; --navy: #1A2332;
      --text: #1A2332; --text-2: #5A6A82; --text-3: #9AAABB;
      --border: #E2E8F0; --bg: #F8FAFC; --pos: #16A34A; --neg: #DC2626;
    }

    body { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); background: #fff; line-height: 1.5; }

    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; color: var(--text-2);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #report { display: none; max-width: 960px; margin: 0 auto; padding: 0 24px 48px; }

    /* Header */
    .rpt-header {
      background: var(--navy); color: #fff; padding: 28px 32px; margin: 0 -24px 32px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
    }
    .rpt-header-left h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .rpt-header-left p  { font-size: 12px; color: rgba(255,255,255,0.55); }
    .rpt-header-meta { text-align: right; font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.8; }
    .rpt-header-meta strong { color: rgba(255,255,255,0.85); font-weight: 500; }
    .rmc-brand {
      display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700;
      letter-spacing: 0.04em; color: var(--green); text-transform: uppercase; margin-bottom: 12px;
    }
    .rmc-brand span { color: rgba(255,255,255,0.7); font-weight: 400; letter-spacing: 0; text-transform: none; }

    /* Section */
    .rpt-section { margin-bottom: 36px; }
    .rpt-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-3); border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 16px;
    }

    /* Tiles */
    .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tile { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .tile-label { font-size: 11px; color: var(--text-2); margin-bottom: 6px; }
    .tile-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .tile-change { font-size: 11px; font-weight: 500; margin-top: 4px; display: flex; align-items: center; gap: 3px; }
    .tile-change.pos { color: var(--pos); } .tile-change.neg { color: var(--neg); } .tile-change.neu { color: var(--text-3); }
    .tile-prev { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* Chart */
    .chart-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 20px; position: relative; height: 220px; }

    /* Stat row (traffic) */
    .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-bottom: 5px; }
    .stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .stat-sub { font-size: 11px; color: var(--text-2); margin-top: 3px; }

    /* Table */
    .rpt-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .rpt-table th {
      text-align: left; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-3); padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .rpt-table th.r, .rpt-table td.r { text-align: right; }
    .rpt-table td { padding: 9px 10px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
    .rpt-table tbody tr:hover { background: var(--bg); }
    .product-title { font-weight: 500; color: var(--text); max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
    .product-asin { font-size: 10px; color: var(--text-3); margin-top: 1px; }
    .delta { font-size: 10px; font-weight: 500; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
    .delta.pos { color: var(--pos); background: #F0FDF4; } .delta.neg { color: var(--neg); background: #FEF2F2; } .delta.neu { color: var(--text-3); }
    .bb-bar { display: flex; align-items: center; gap: 6px; }
    .bb-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; min-width: 36px; }
    .bb-fill { height: 100%; border-radius: 2px; background: var(--green); }

    /* Footer */
    .rpt-footer { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-3); }
    .rpt-footer strong { color: var(--green); }
    .ads-pending { padding: 18px 0; color: var(--text-3); font-size: 12px; display: flex; align-items: center; gap: 10px; }

    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      #report { padding: 0; }
      .rpt-header { margin: 0 0 24px; }
      .chart-wrap, .rpt-section { break-inside: avoid; }
      .rpt-table td, .rpt-table th { padding: 6px 8px; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Generating report…</div>
  <div style="font-size:11px;color:#9AAABB">Fetching sales and traffic data</div>
</div>

<div id="report">
  <div class="rpt-header">
    <div class="rpt-header-left">
      <div class="rmc-brand">RMC <span>/ Rocky Mountain Co.</span></div>
      <h1 id="brandName">Brand Report</h1>
      <p id="periodLabel"></p>
    </div>
    <div class="rpt-header-meta">
      <div><strong>Period</strong> <span id="metaPeriod"></span></div>
      <div><strong>Comparison</strong> <span id="metaComparison"></span></div>
      <div><strong>Currency</strong> CAD + USD</div>
      <div style="margin-top:8px"><span id="metaGenerated"></span></div>
    </div>
  </div>

  <!-- Sections are rendered here in config order -->
  <div id="sections"></div>

  <div class="rpt-footer">
    <div>Prepared by <strong>Rocky Mountain Co.</strong> — Confidential</div>
    <div id="footerGenerated"></div>
  </div>
</div>

<script>
// ── Report config ────────────────────────────────────────────────────────────
// The report is DATA-DRIVEN: this object defines which sections render, in what
// order, and which KPIs lead. Phase 2 (plug-and-play dashboard) will edit/persist
// this per brand — the renderer below already reads from it, so no rebuild needed.
const REPORT_CONFIG = {
  headlineKpis: ['revCad', 'revUsd', 'units', 'sessions', 'cvr', 'buyBox'],
  sections: [
    { key: 'headline',    title: 'Performance Highlights', enabled: true },
    { key: 'trend',       title: 'Revenue Trend',          enabled: true },
    { key: 'traffic',     title: 'Traffic & Conversion',   enabled: true },
    { key: 'advertising', title: 'Advertising',            enabled: true },
    { key: 'products',    title: 'Product Performance',    enabled: true },
  ],
};

const $ = id => document.getElementById(id);

// ── Formatters ───────────────────────────────────────────────────────────────
const pct = (curr, prev) => (!prev || prev === 0) ? null : Math.round((curr - prev) / prev * 1000) / 10;
const fmtC = (v, sym = 'CA$') => (v == null || isNaN(v)) ? '—' : sym + Math.round(v).toLocaleString('en-US');
const fmtN = v => v == null ? '—' : v.toLocaleString('en-US');
const fmtPct = v => v == null || isNaN(v) ? '—' : (Math.round(v * 10) / 10) + '%';

function deltaHtml(curr, prev) {
  const p = pct(curr, prev);
  if (p === null) return '<span class="delta neu">—</span>';
  return `<span class="delta ${p >= 0 ? 'pos' : 'neg'}">${p >= 0 ? '+' : ''}${p}%</span>`;
}

// ── Derived metrics ──────────────────────────────────────────────────────────
function cvrOf(units, sessions) { return sessions ? units / sessions * 100 : null; }

function computeExtras(d) {
  const s = d.summary;
  const cvr = cvrOf(s.units, s.sessions);
  // Buy box: session-weighted average across products (falls back to simple mean).
  let wSum = 0, wTot = 0, simpleSum = 0, simpleN = 0;
  for (const p of d.products) {
    if (p.buyBox == null) continue;
    simpleSum += p.buyBox; simpleN++;
    if (p.sessions) { wSum += p.buyBox * p.sessions; wTot += p.sessions; }
  }
  const buyBox = wTot ? wSum / wTot : (simpleN ? simpleSum / simpleN : null);
  return { cvr, buyBox };
}

// ── Tile builder ─────────────────────────────────────────────────────────────
function tile(label, value, change, prevTxt) {
  const cls = change == null ? 'neu' : change >= 0 ? 'pos' : 'neg';
  const chg = change == null ? '' : `<div class="tile-change ${cls}">${change >= 0 ? '+' : ''}${change}% vs prior period</div>`;
  const prev = prevTxt ? `<div class="tile-prev">${prevTxt}</div>` : '';
  return `<div class="tile"><div class="tile-label">${label}</div><div class="tile-value">${value}</div>${chg}${prev}</div>`;
}

function headlineTile(key, s, sp, ex) {
  switch (key) {
    case 'revCad':   return tile('Revenue (CA$)', fmtC(s.revenueCad), pct(s.revenueCad, sp.revenueCad), 'Prior: ' + fmtC(sp.revenueCad));
    case 'revUsd':   return tile('Revenue (US$)', fmtC(s.revenueUsd, 'US$'), pct(s.revenueUsd, sp.revenueUsd), 'Prior: ' + fmtC(sp.revenueUsd, 'US$'));
    case 'units':    return tile('Units Sold', fmtN(s.units), pct(s.units, sp.units), 'Prior: ' + fmtN(sp.units));
    case 'sessions': return tile('Sessions', fmtN(s.sessions), null, null);
    case 'cvr':      return tile('Conversion (CVR)', fmtPct(ex.cvr), null, 'Units ÷ sessions');
    case 'buyBox':   return tile('Buy Box %', fmtPct(ex.buyBox), null, 'Session-weighted avg');
    default:         return '';
  }
}

// ── Section builders ─────────────────────────────────────────────────────────
const SECTION_BUILDERS = {
  headline(d, ex) {
    return `<div class="tiles">${REPORT_CONFIG.headlineKpis.map(k => headlineTile(k, d.summary, d.summaryPrev, ex)).join('')}</div>`;
  },
  trend() {
    return `<div class="chart-wrap"><canvas id="salesChart"></canvas></div>`;
  },
  traffic(d, ex) {
    const s = d.summary;
    return `<div class="stat-row">
      <div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">${fmtN(s.sessions)}</div><div class="stat-sub">Buyer sessions</div></div>
      <div class="stat"><div class="stat-label">Page Views</div><div class="stat-value">${fmtN(s.pageViews)}</div><div class="stat-sub">Listing views</div></div>
      <div class="stat"><div class="stat-label">Conversion (CVR)</div><div class="stat-value">${fmtPct(ex.cvr)}</div><div class="stat-sub">Units ÷ sessions</div></div>
      <div class="stat"><div class="stat-label">Buy Box %</div><div class="stat-value">${fmtPct(ex.buyBox)}</div><div class="stat-sub">Session-weighted</div></div>
    </div>`;
  },
  advertising() {
    return `<div class="ads-pending" id="adsPending">
        <div class="spinner" style="width:18px;height:18px;border-width:2px"></div>
        Fetching advertising data — this takes 1–3 minutes…
      </div>
      <div class="stat-row" id="adsGrid" style="grid-template-columns:repeat(4,1fr)"></div>`;
  },
  products(d) {
    const rows = d.products.map(p => {
      const currRev = p.revenueCad + p.revenueUsd;
      const prevRev = p.prev.revenueCad + p.prev.revenueUsd;
      const cvr = cvrOf(p.units, p.sessions);
      const bb = p.buyBox != null
        ? `<div class="bb-bar"><div class="bb-track"><div class="bb-fill" style="width:${Math.min(p.buyBox, 100)}%"></div></div><span>${p.buyBox}%</span></div>`
        : '—';
      return `<tr>
        <td><span class="product-title" title="${p.title}">${p.title}</span><span class="product-asin">${p.asin}</span></td>
        <td class="r">${fmtC(p.revenueCad)}</td>
        <td class="r">${fmtC(p.revenueUsd, 'US$')}</td>
        <td class="r">${fmtN(p.units)}</td>
        <td class="r">${deltaHtml(currRev, prevRev)}</td>
        <td class="r">${fmtN(p.sessions)}</td>
        <td class="r">${fmtPct(cvr)}</td>
        <td class="r">${bb}</td>
        <td class="r acos-cell" style="display:none">—</td>
      </tr>`;
    }).join('');
    return `<table class="rpt-table">
      <thead><tr>
        <th>Product</th>
        <th class="r">Revenue (CA$)</th>
        <th class="r">Revenue (US$)</th>
        <th class="r">Units</th>
        <th class="r">vs Prior</th>
        <th class="r">Sessions</th>
        <th class="r">CVR</th>
        <th class="r">Buy Box</th>
        <th class="r acos-head" style="display:none">ACOS</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  },
};

// ── Render ───────────────────────────────────────────────────────────────────
function render(d) {
  document.title = `${d.brand.name} — RMC Report`;
  $('brandName').textContent = d.brand.name;
  $('periodLabel').textContent = d.period.label;
  $('metaPeriod').textContent = d.period.label;
  $('metaComparison').textContent = d.comparison.label;
  const gen = new Date(d.generatedAt).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
  $('metaGenerated').textContent = `Generated ${gen}`;
  $('footerGenerated').textContent = `Generated ${gen}`;

  const ex = computeExtras(d);

  // Build enabled sections in config order.
  $('sections').innerHTML = REPORT_CONFIG.sections
    .filter(sec => sec.enabled && SECTION_BUILDERS[sec.key])
    .map(sec => `<div class="rpt-section" data-section="${sec.key}">
        <div class="rpt-section-title">${sec.title}</div>
        ${SECTION_BUILDERS[sec.key](d, ex)}
      </div>`)
    .join('');

  // Chart needs the canvas in the DOM first.
  if (REPORT_CONFIG.sections.find(s => s.key === 'trend' && s.enabled)) {
    buildChart(d.dailySeries, d.dailySeriesPrev, d.period, d.comparison);
  }

  $('loading').style.display = 'none';
  $('report').style.display = 'block';
}

function renderAds(a, totalRevCad, totalRevUsd) {
  const grid = $('adsGrid');
  const pending = $('adsPending');
  if (!grid) return;
  if (pending) pending.style.display = 'none';

  const totalSpend = a.spendCad + a.spendUsd;
  const totalRev = totalRevCad + totalRevUsd;
  const tacos = totalRev > 0 ? Math.round(totalSpend / totalRev * 10000) / 100 : null;
  const stats = [
    { label: 'Total Ad Spend', value: fmtC(a.spendCad) + ' / ' + fmtC(a.spendUsd, 'US$'), sub: '' },
    { label: 'ACOS', value: a.acos != null ? a.acos + '%' : '—', sub: 'Spend ÷ attributed sales' },
    { label: 'ROAS', value: a.roas != null ? a.roas + 'x' : '—', sub: 'Sales per $ spent' },
    { label: 'TACOS', value: tacos != null ? tacos + '%' : '—', sub: 'Spend ÷ total sales' },
    { label: 'Attributed Sales', value: fmtC(a.salesCad) + ' / ' + fmtC(a.salesUsd, 'US$'), sub: '14-day attribution' },
    { label: 'Clicks', value: fmtN(a.clicks), sub: 'CPC: ' + (a.cpc != null ? '$' + a.cpc : '—') },
    { label: 'Impressions', value: fmtN(a.impressions), sub: '' },
    { label: 'Ad Orders', value: fmtN(a.orders), sub: '' },
  ];
  grid.innerHTML = stats.map(s =>
    `<div class="stat"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div>${s.sub ? `<div class="stat-sub">${s.sub}</div>` : ''}</div>`
  ).join('');

  // Inject ACOS into the product table.
  document.querySelectorAll('.acos-head').forEach(h => h.style.display = '');
  document.querySelectorAll('#sections tbody tr').forEach(row => {
    const asin = row.querySelector('.product-asin')?.textContent;
    const cell = row.querySelector('.acos-cell');
    if (cell) {
      cell.style.display = '';
      const d = asin && a.byAsin?.[asin];
      cell.textContent = d?.acos != null ? d.acos + '%' : '—';
    }
  });
}

function buildChart(series, seriesPrev, period, comparison) {
  if (!series.length && !seriesPrev.length) return;
  const periodDays = Math.round((new Date(period.to) - new Date(period.from)) / 86400000) + 1;
  const labels = series.map(d => new Date(d.date + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
  const prevMap = {};
  for (const d of seriesPrev) prevMap[d.date] = d;
  const prevAligned = series.map(d => {
    const offsetStr = new Date(new Date(d.date + 'T12:00:00Z') - periodDays * 86400000).toISOString().split('T')[0];
    return prevMap[offsetStr] || null;
  });
  const curr = series.map(d => Math.round((d.revCad + d.revUsd) * 100) / 100);
  const prev = prevAligned.map(d => d ? Math.round((d.revCad + d.revUsd) * 100) / 100 : null);

  new Chart($('salesChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: period.label, data: curr, borderColor: '#537D30', backgroundColor: 'rgba(83,125,48,0.08)', borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#537D30', tension: 0.3, fill: true },
        { label: comparison.label, data: prev, borderColor: '#94A3B8', backgroundColor: 'transparent', borderWidth: 1.5, pointRadius: 2, borderDash: [4, 3], tension: 0.3, fill: false },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', labels: { font: { family: 'Inter', size: 11 }, boxWidth: 16, padding: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.raw?.toLocaleString('en-US') || '—'}` } },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: 'Inter', size: 10 }, maxRotation: 0, maxTicksLimit: 10 } },
        y: { grid: { color: '#F1F5F9' }, ticks: { font: { family: 'Inter', size: 10 }, callback: v => '$' + v.toLocaleString('en-US') } },
      },
    },
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const params = new URLSearchParams(location.search);
  const brand = params.get('brand');
  const from = params.get('from');
  const to = params.get('to');

  if (!brand) {
    $('loading').innerHTML = '<div style="color:#DC2626;font-size:14px">Missing <code>?brand=</code> parameter</div>';
    return;
  }

  const qs = [from && `from=${from}`, to && `to=${to}`].filter(Boolean).join('&');
  const base = `/api/report-data/${encodeURIComponent(brand)}${qs ? '?' + qs : ''}`;
  const adsUrl = `/api/report-ads/${encodeURIComponent(brand)}${qs ? '?' + qs : ''}`;

  let reportData;
  try {
    const res = await fetch(base, { credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    reportData = data;
    render(data);
  } catch (e) {
    $('loading').innerHTML = `<div style="color:#DC2626;font-size:14px">Failed to load report: ${e.message}</div>`;
    return;
  }

  // Ads load separately (Amazon report must bake). Only if the section is enabled.
  if (REPORT_CONFIG.sections.find(s => s.key === 'advertising' && s.enabled)) {
    try {
      const res = await fetch(adsUrl, { credentials: 'include' });
      const data = await res.json();
      if (res.ok) renderAds(data.summary, reportData.summary.revenueCad, reportData.summary.revenueUsd);
      else { const p = $('adsPending'); if (p) p.textContent = 'Advertising data unavailable.'; }
    } catch (e) {
      const p = $('adsPending'); if (p) p.textContent = 'Advertising data unavailable.';
    }
  }
})();
</script>
</body>
</html>
