      },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 }, color: '#9AAABB', maxRotation: 0, autoSkip: true } },
        y:  { stacked: true, grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 }, color: '#9AAABB', callback: v => '$' + v.toLocaleString() }, beginAtZero: true, position: 'left' },
        y1: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9AAABB', callback: v => v + 'x' }, beginAtZero: true, position: 'right' },
      },
    },
  });
}

// ── Executive summary controller ──────────────────────────────────────────────
let execState = { brandId: null, from: null, to: null, dirty: false, edited: false, generating: false };

function setExecStatus(msg, isError = false) {
  const el = document.getElementById('execSummaryStatus');
  if (!el) return;
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
}
function setExecMeta(meta) {
  const el = document.getElementById('execSummaryMeta');
  if (el) el.textContent = meta || '';
}

function showExecSummary(text) {
  const textarea = document.getElementById('execSummaryText');
  const actions  = document.getElementById('execActions');
  const empty    = document.getElementById('execEmpty');
  if (!textarea) return;
  textarea.value = text || '';
  textarea.style.display = 'block';
  if (actions) actions.style.display = 'flex';
  if (empty)   empty.style.display = 'none';
}

function showExecEmpty() {
  const textarea = document.getElementById('execSummaryText');
  const actions  = document.getElementById('execActions');
  const empty    = document.getElementById('execEmpty');
  if (textarea) textarea.style.display = 'none';
  if (actions)  actions.style.display = 'none';
  if (empty)    empty.style.display = 'block';
}

// Loads a cached summary if one exists. Deliberately does NOT generate:
// opening a report is free, generating costs money and must be a choice.
// When viewing a saved report, the frozen summary is passed in directly.
async function initExecSummary(brandId, from, to, frozenText, preloaded) {
  execState = { brandId, from, to, dirty: false, edited: false, generating: false };

  const textarea = document.getElementById('execSummaryText');
  const saveBtn  = document.getElementById('execSaveBtn');
  const genBtn   = document.getElementById('execGenerateBtn');
  const writeBtn = document.getElementById('execWriteBtn');
  if (!textarea) return;

  saveBtn.disabled  = true;
  setExecMeta('');
  setExecStatus('');

  textarea.oninput = () => { execState.dirty = true; saveBtn.disabled = false; };
  saveBtn.onclick  = () => saveExecSummary();
  // Generation is reachable ONLY from the empty state — there is no regenerate.
  if (genBtn) genBtn.onclick = () => generateExecSummary();
  // Write-it-myself: just open the editor. No dialog, no API call, no cost.
  if (writeBtn) writeBtn.onclick = () => {
    showExecSummary('');
    textarea.focus();
    refreshSaveBtn();
  };

  // Viewing a frozen saved report — show its summary, no editing, no fetching.
  if (frozenText != null) {
    showExecSummary(frozenText);
    textarea.readOnly = true;
    document.getElementById('execActions').style.display = 'none';
    return;
  }
  textarea.readOnly = false;

  try {
    // render() already fetched this; only fall back to a request if it didn't.
    const data = preloaded ?? await (await fetch(
      `/api/brand-report-summary/${encodeURIComponent(brandId)}?from=${from}&to=${to}`,
      { credentials: 'include' })).json();
    if (data?.summary_text) {
      execState.edited = !!data.edited;
      showExecSummary(data.summary_text);
    } else {
      showExecEmpty();   // ← no Claude call
    }
  } catch (err) {
    setExecStatus('Failed to load summary — ' + err.message, true);
    showExecEmpty();
  }
  refreshSaveBtn();
}

// One-shot: only reachable from the empty state, so it can never overwrite an
// existing summary or fire twice from a stray click.
async function generateExecSummary() {
  const textarea = document.getElementById('execSummaryText');
  const saveBtn  = document.getElementById('execSaveBtn');
  const genBtn   = document.getElementById('execGenerateBtn');
  if (!textarea) return;

  // Generation is a paid Claude call, so it's always confirmed. Once generated
  // it's cached for this brand+period — viewing it again is free.
  if (!confirm('Generate an executive summary?\n\nThis calls Claude — a paid API request. Once generated it\'s saved for this brand and period, so viewing it again is free.')) return;

  execState.generating = true;
  refreshSaveBtn();
  if (genBtn)   { genBtn.disabled = true; genBtn.textContent = 'Generating…'; }
  if (saveBtn)  saveBtn.disabled = true;
  setExecStatus('Generating…');
  setExecMeta('');

  try {
    const url = `/api/brand-report-summary/${encodeURIComponent(execState.brandId)}?from=${execState.from}&to=${execState.to}`;
    const res = await fetch(url, { method: 'POST', credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    execState.dirty  = false;
    execState.edited = false;
    showExecSummary(data.summary_text || '');
    setExecStatus('');
    setExecMeta('');
    refreshSaveBtn();
  } catch (err) {
    setExecStatus('Generation failed — ' + err.message, true);
  } finally {
    execState.generating = false;
    if (genBtn)   { genBtn.disabled = false; genBtn.textContent = 'Generate summary'; }
    refreshSaveBtn();
  }
}

async function saveExecSummary() {
  const textarea = document.getElementById('execSummaryText');
  const saveBtn  = document.getElementById('execSaveBtn');
  if (!textarea) return;

  saveBtn.disabled = true;
  setExecStatus('Saving…');
  try {
    const res = await fetch(`/api/brand-report-summary/${encodeURIComponent(execState.brandId)}?from=${execState.from}&to=${execState.to}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ summary_text: textarea.value }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    execState.dirty  = false;
    execState.edited = true;
    setExecStatus('');
    setExecMeta('Saved');
    setTimeout(() => setExecMeta(''), 2500);
  } catch (err) {
    setExecStatus('Save failed — ' + err.message, true);
    saveBtn.disabled = false;
  }
}

init();
