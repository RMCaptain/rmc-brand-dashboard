<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RMC Brand Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* The page keeps the app's DARK theme (from /style.css) so the nav and
       toolbar stay readable. The report itself is a light "paper" document —
       it's what a brand sees and becomes the PDF — so the light tokens
       are scoped to #report ONLY. Never override these on :root: the nav's
       hover state reads var(--text), so a global light override makes the
       nav links invisible against the dark nav.

       Colours below are the official RMC brand palette (Canva brand guide,
       2026-07-14). Fonts: Poppins for titles, Inter for everything else. */
    #report, body.print-mode {
      --green:    #2c3a20;   /* primary dark forest green */
      --green-lt: #9db47e;   /* sage accent */
      --green-tint: #eef2e8; /* derived wash for hovers/fills */
      --navy:     #1b2016;   /* near-black green — report header */
      --text:     #33392c;   /* dark olive — body copy */
      --text-2:   #6e7567;   /* mid grey-green — secondary */
      --text-3:   #9aa093;   /* derived muted — labels */
      --border:   #e4e1d5;   /* warm light grey */
      --bg:       #faf8f2;   /* cream — page/well background */
      --pos: #16A34A; --neg: #DC2626;
      --amber: #F59E0B; --amber-bg: #FEF3C7; --red-bg: #FEE2E2;
    }
    /* Poppins for the report's display type; Inter carries body copy. */
    #report .rpt-header-left h1,
    #report .rpt-section-title,
    #report .tile-value,
    #report .ad-stat-value { font-family: 'Poppins', 'Inter', sans-serif; }
    body {
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--text); background: var(--bg); line-height: 1.5;
    }
    #report { color: var(--text); }

    /* Print mode (used by the Puppeteer PDF render with ?print=1). Hides nav
       + toolbar + interactive controls; widens the report; removes editable
       affordances so the textarea reads as plain prose. */
    body.print-mode { background: #fff; }
    body.print-mode .rmc-nav,
    body.print-mode .rpt-toolbar { display: none !important; }
    body.print-mode #report { max-width: none; padding: 0; }
    body.print-mode .rpt-header { border-radius: 0; margin-bottom: 20px; }
    body.print-mode .exec-textarea {
      background: transparent !important; border: 0 !important; padding: 0 !important;
      resize: none !important; min-height: 0 !important; pointer-events: none;
      font-size: 13px; color: var(--text);
    }
    body.print-mode .exec-actions,
    body.print-mode .exec-status:empty { display: none !important; }
    body.print-mode .exec-status { display: none; }

    /* Report toolbar — app chrome, so it uses the DARK theme tokens (it sits
       outside #report and therefore inherits :root from /style.css). */
    .rpt-toolbar {
      background: var(--bg-surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 10;
    }
    .rpt-toolbar label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-2); }
    .rpt-toolbar select {
      background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 6px 10px; font-size: 13px; color: var(--text); font-family: inherit; cursor: pointer;
    }
    .rpt-toolbar select:hover  { border-color: var(--border-hi); }
    .rpt-toolbar select:focus  { outline: none; border-color: var(--brand); }
    .rpt-toolbar select option { background: var(--bg-surface); color: var(--text); }
    .rpt-toolbar .spacer { flex: 1; }
    .rpt-toolbar .btn {
      background: var(--brand); color: #fff; border: 0; border-radius: var(--r-sm);
      padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    .rpt-toolbar .btn:hover:not(:disabled) { background: var(--brand-hover); box-shadow: 0 0 24px var(--brand-glow); }
    .rpt-toolbar .btn:disabled { opacity: 0.5; cursor: wait; }
    .rpt-toolbar .btn-secondary {
      background: var(--bg-well); color: var(--text-2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 8px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s ease;
    }
    .rpt-toolbar .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--border-hi); }
    .rpt-toolbar .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
    /* Destructive — muted until hover so it isn't the loudest thing on screen. */
    .rpt-toolbar .btn-danger {
      background: transparent; color: var(--neg); border: 1px solid rgba(248,113,113,0.35);
      border-radius: var(--r-sm); padding: 8px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s ease;
    }
    .rpt-toolbar .btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.12); border-color: var(--neg); }
    .rpt-toolbar .btn-danger:disabled { opacity: 0.4; cursor: wait; }

    /* Banner shown when viewing a frozen saved report rather than live data. */
    .snapshot-banner {
      background: rgba(251,191,36,0.10); border-bottom: 1px solid rgba(251,191,36,0.30);
      color: var(--warn); padding: 9px 32px; font-size: 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .snapshot-banner button {
      background: transparent; border: 1px solid rgba(251,191,36,0.45); color: var(--warn);
      border-radius: var(--r-xs); padding: 4px 10px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .snapshot-banner button:hover { background: rgba(251,191,36,0.14); }
    body.print-mode .snapshot-banner { display: none !important; }

    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; color: var(--text-2); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #report { display: none; max-width: 1040px; margin: 0 auto; padding: 24px 24px 64px; }

    /* Report header (the polished document banner) */
    .rpt-header {
      background: var(--navy); color: #fff; padding: 28px 32px; border-radius: 12px; margin-bottom: 24px;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
    }
    .rpt-header-left h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .rpt-header-left p  { font-size: 12px; color: rgba(255,255,255,0.55); }
    .rpt-header-meta { text-align: right; font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.8; }
    .rpt-header-meta strong { color: rgba(255,255,255,0.85); font-weight: 500; }
    .rpt-logo { height: 34px; width: auto; display: block; margin-bottom: 14px; }

    /* Section */
    .rpt-section { margin-bottom: 28px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
    .rpt-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 16px; }

    /* Placeholder section (coming soon) */
    .rpt-placeholder { padding: 18px 0; color: var(--text-3); font-size: 12px; }
    .rpt-placeholder strong { color: var(--text-2); font-weight: 600; }
    /* "No data" must read as an absence, not as a number worth comparing. */
    .ad-stat-value.ad-stat-nodata { color: var(--text-3); font-weight: 500; }
    .rpt-note { margin-top: 10px; font-size: 11px; color: var(--text-3); }

    /* Executive summary editor */
    .exec-status { font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
    .exec-status.error { color: var(--neg); }
    .exec-status:empty { margin-bottom: 0; }
    .exec-empty {
      padding: 22px; text-align: center; background: var(--bg);
      border: 1px dashed var(--border); border-radius: 10px;
    }
    .exec-empty p { font-size: 12px; color: var(--text-2); margin-bottom: 12px; }
    .exec-empty-actions { display: flex; gap: 8px; justify-content: center; }
    .exec-empty-hint { font-size: 11px; color: var(--text-3); margin: 12px 0 0 !important; }
    body.print-mode .exec-empty { display: none !important; }
    .exec-textarea {
      width: 100%; min-height: 200px; padding: 14px 16px; font-family: 'Inter', sans-serif;
      font-size: 13px; line-height: 1.6; color: var(--text); background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px; resize: vertical;
    }
    .exec-textarea:focus { outline: none; border-color: var(--green); background: #fff; }
    .exec-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 12px; }
    .exec-meta { font-size: 11px; color: var(--text-3); }
    .exec-buttons { display: flex; gap: 8px; }
    .exec-btn, .exec-btn-secondary {
      font-family: inherit; font-size: 12px; font-weight: 600; padding: 7px 14px;
      border-radius: 8px; cursor: pointer; transition: opacity 0.15s, background 0.15s;
    }
    .exec-btn { background: var(--green); color: #fff; border: 0; }
    .exec-btn:hover:not(:disabled) { background: #466A28; }
    .exec-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .exec-btn-secondary { background: #fff; color: var(--text-2); border: 1px solid var(--border); }
    .exec-btn-secondary:hover:not(:disabled) { background: var(--bg); color: var(--text); }
    .exec-btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Headline tiles */
    .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .tile { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .tile-label { font-size: 11px; color: var(--text-2); margin-bottom: 6px; }
    .tile-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .tile-change { font-size: 11px; font-weight: 500; margin-top: 4px; }
    .tile-change.pos { color: var(--pos); } .tile-change.neg { color: var(--neg); } .tile-change.neu { color: var(--text-3); }
    .tile-prev { font-size: 11px; color: var(--text-3); margin-top: 2px; }

    /* Chart */
    .chart-wrap { position: relative; height: 240px; }

    /* Ad summary grid (TACOS / TROAS / ACOS / ROAS — Merchant Spring style) */
    .ad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .ad-stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .ad-stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-bottom: 5px; }
    .ad-stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .ad-stat-sub { font-size: 11px; color: var(--text-2); margin-top: 3px; }
    .ad-section-sub { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin: 18px 0 8px; }

    /* Top sellers table */
    .rpt-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .rpt-table th { text-align: left; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .rpt-table th.r, .rpt-table td.r { text-align: right; }
    .rpt-table td { padding: 9px 10px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
    .rpt-table tbody tr:hover { background: var(--bg); }
    .product-title { font-weight: 500; color: var(--text); max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }
    .product-asin { font-size: 10px; color: var(--text-3); margin-top: 1px; font-family: ui-monospace, monospace; }
    .delta { font-size: 10px; font-weight: 500; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
    .delta.pos { color: var(--pos); background: #F0FDF4; } .delta.neg { color: var(--neg); background: #FEF2F2; } .delta.neu { color: var(--text-3); }
    .stock-chip { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; }
    .stock-chip.good { background: #DCFCE7; color: #166534; }
    .stock-chip.warn { background: var(--amber-bg); color: #92400E; }
    .stock-chip.low  { background: var(--red-bg); color: #991B1B; }

    /* ── Section panel (screen only) ──────────────────────────────────────
       A COLUMN beside the report, not an overlay on top of it. The first
       version was position:fixed and covered the toolbar.

       Uses the app's DARK theme tokens — it sits outside #report, on the app
       chrome, NOT on the report's light paper. Hardcoding light colours here
       is how the text disappeared last time. */
    .rpt-layout {
      display: flex; align-items: flex-start; gap: 20px;
      max-width: 1360px; margin: 0 auto; padding: 24px 24px 0;
    }
    .section-panel {
      width: 268px; flex: none;
      /* Sticky, not fixed: it scrolls with the page but stops clear of the
         sticky toolbar instead of sitting on it. */
      position: sticky; top: 88px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px;
      max-height: calc(100vh - 110px); overflow-y: auto;
    }
    .sp-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .sp-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .sp-status { font-size: 11px; color: var(--text-3); }
    .sp-status.err { color: var(--neg); }
    .sp-hint { font-size: 11px; color: var(--text-2); margin: 6px 0 14px; line-height: 1.45; }
    .sp-list { display: flex; flex-direction: column; gap: 3px; }
    .sp-row {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 8px; border-radius: 7px; border: 1px solid transparent;
      font-size: 13px; color: var(--text); cursor: grab;
    }
    .sp-row:hover { background: var(--bg-card-h); }
    .sp-row.sp-dragging { opacity: 0.4; cursor: grabbing; }
    .sp-row.sp-drop-target { border-color: var(--brand); background: var(--bg-card-h); }
    .sp-grip { color: var(--text-3); font-size: 15px; line-height: 1; flex: none; letter-spacing: -2px; }
    .sp-name { display: flex; align-items: center; gap: 9px; flex: 1; cursor: inherit; min-width: 0; }
    /* Names wrap rather than truncate — "Revenue Share by Prod…" tells you less
       than two tidy lines do, and these are the labels you pick sections by. */
    .sp-name span { white-space: normal; line-height: 1.3; }
    .sp-name input { accent-color: var(--brand); cursor: pointer; flex: none; width: 15px; height: 15px; }
    /* Pinned: no grip, no checkbox, not draggable — structural, not optional. */
    .sp-row-pinned { cursor: default; }
    .sp-row-pinned:hover { background: transparent; }
    .sp-row-pinned .sp-name { color: var(--text-2); }
    .sp-grip-locked { font-size: 11px; opacity: 0.5; }
    /* Sits under the name, so a long title keeps the full row width to itself
       instead of being squeezed onto two lines by this label. */
    .sp-always {
      font-size: 10px; color: var(--text-3); white-space: nowrap;
      align-self: center; margin-left: auto; padding-left: 8px;
    }
    /* Report keeps its own max-width; drop the auto-centring so it sits in the
       column rather than fighting flex for the middle of the page. */
    .rpt-layout #report { flex: 1; min-width: 0; margin: 0; padding: 0 0 64px; }
    /* Not enough room for two columns — stack, full width, no sticky. */
    @media (max-width: 1180px) {
      .rpt-layout { flex-direction: column; padding: 16px; }
      .section-panel { position: static; width: 100%; max-height: none; }
      .rpt-layout #report { width: 100%; }
    }
    /* Print: the layout wrapper must not constrain the page. */
    body.print-mode .rpt-layout { display: block; max-width: none; padding: 0; }
    body.print-mode .rpt-layout #report { padding: 0; }

    /* Section grips (screen only) */
    .rpt-section-draggable .rpt-section-title { display: flex; align-items: center; gap: 8px; }
    .rpt-grip {
      color: var(--text-3); font-size: 13px; letter-spacing: -1px; cursor: grab;
      opacity: 0; transition: opacity 0.15s ease;
    }
    .rpt-section-draggable:hover .rpt-grip { opacity: 1; }
    .rpt-section-dragging { opacity: 0.45; }
    .rpt-section-drop { outline: 2px dashed var(--green-lt); outline-offset: 4px; }

    /* Nothing interactive reaches the PDF. */
    body.print-mode .section-panel,
    body.print-mode .rpt-grip { display: none !important; }
    @media print {
      .section-panel, .rpt-grip { display: none !important; }
    }

    /* Revenue share pie */
    .pie-wrap { display: grid; grid-template-columns: 1fr 260px; gap: 24px; align-items: center; }
    .pie-chart-box { height: 300px; position: relative; }
    .pie-legend { display: flex; flex-direction: column; gap: 7px; }
    .pie-legend-row { display: flex; align-items: baseline; gap: 8px; font-size: 11px; }
    .pie-swatch { width: 10px; height: 10px; border-radius: 2px; flex: none; transform: translateY(1px); }
    .pie-legend-name { flex: 1; color: var(--text); line-height: 1.3; min-width: 0; }
    .pie-legend-asin {
      display: block; font-size: 9px; color: var(--text-3);
      font-family: ui-monospace, monospace; margin-top: 1px;
    }
    .pie-legend-pct { font-weight: 600; color: var(--text); white-space: nowrap; }
    /* Stack under the chart when narrow, and keep the pie off a page break. */
    @media (max-width: 820px) { .pie-wrap { grid-template-columns: 1fr; } }
    @media print { .pie-wrap { page-break-inside: avoid; } }

    /* Per-ASIN detail */
    .per-asin-table { font-size: 11px; }
    .per-asin-table td { padding: 7px 8px; }
    .per-asin-table .product-title { max-width: 230px; }
    .rpt-table th.sortable { cursor: pointer; user-select: none; }
    .rpt-table th.sortable:hover { color: var(--text); }
    .rpt-table th.sorted { color: var(--green); }
    .per-asin-foot {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-top: 12px; flex-wrap: wrap;
    }
    .per-asin-pager { display: flex; align-items: center; gap: 8px; }
    .pg-btn {
      background: #fff; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 11px; font-size: 11px; font-weight: 500; color: var(--text);
      font-family: 'Inter', sans-serif; cursor: pointer;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--green-lt); color: var(--green); }
    .pg-btn:disabled { opacity: 0.4; cursor: default; }
    .pg-info { font-size: 11px; color: var(--text-2); }

    /* Print: the table can run past one page, so repeat the header on each and
       never split a row across the break. Pager is screen-only by definition. */
    body.print-mode .per-asin-foot { margin-top: 8px; }
    body.print-mode .per-asin-pager { display: none; }
    @media print {
      .per-asin-table thead { display: table-header-group; }
      .per-asin-table tr    { page-break-inside: avoid; }
      .per-asin-pager       { display: none; }
    }

    /* Footer */
    .rpt-footer { padding: 16px 24px; font-size: 11px; color: var(--text-3); display: flex; justify-content: space-between; align-items: center; }
    .rpt-footer strong { color: var(--green); }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="rmc-nav">
    <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="nav-logo">
          <img src="/rmc-logo.png" alt="RMC" />
        </a>
        <div class="flex gap-1">
          <a href="/" class="nav-link">Dashboard</a>
          <a href="/brands.html" class="nav-link">Brands</a>
          <a href="/products.html" class="nav-link">Products</a>
          <a href="/po.html" class="nav-link">PO Builder</a>
          <a href="/reports.html" class="nav-link active">Reporting</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Report toolbar -->
  <div class="rpt-toolbar">
    <label for="brandSelect">Brand</label>
    <select id="brandSelect"><option>Loading…</option></select>
    <label for="periodSelect">Period</label>
    <select id="periodSelect">
      <option value="lastMonth" selected>Last Month</option>
      <option value="mtd">Month to Date</option>
      <option value="last7d">Last 7 Days</option>
      <option value="last30d">Last 30 Days</option>
      <option value="last90d">Last 90 Days</option>
    </select>
    <label for="savedSelect">History</label>
    <select id="savedSelect" title="Reports previously saved for this brand">
      <option value="" disabled selected>No saved reports</option>
    </select>
    <div class="spacer"></div>
    <!-- Only shown while viewing a saved report — there's nothing to delete otherwise. -->
    <button class="btn-danger" id="deleteBtn" type="button" style="display:none;">Delete report</button>
    <button class="btn-secondary" id="saveBtn" type="button">Save report</button>
    <button class="btn" id="pdfBtn" type="button">Generate PDF</button>
  </div>

  <div id="snapshotBanner" class="snapshot-banner" style="display:none;">
    <span id="snapshotBannerText"></span>
    <button type="button" id="backToLiveBtn">Back to live view</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div>Loading report…</div>
  </div>

  <!-- Panel and report are COLUMNS of one flex row, not a floating overlay.
       The panel was position:fixed and sat on top of the toolbar. -->
  <div class="rpt-layout">

    <!-- Screen-only report customiser. Hidden in print-mode (a PDF has no
         controls) and while viewing a saved report (its layout is frozen). -->
    <aside id="sectionPanel" class="section-panel" style="display:none;">
      <div class="sp-head">
        <span class="sp-title">Report sections</span>
        <span id="spStatus" class="sp-status"></span>
      </div>
      <p class="sp-hint">Toggle on or off. Drag to reorder — this becomes the brand's default.</p>
      <div id="spList" class="sp-list"></div>
    </aside>

  <div id="report">
    <div class="rpt-header">
      <div class="rpt-header-left">
        <img src="/rmc-logo.png" alt="Rocky Mountain Co." class="rpt-logo" />
        <h1 id="brandName">Brand Report</h1>
        <p id="periodLabel"></p>
      </div>
      <div class="rpt-header-meta">
        <div><strong>Period</strong> <span id="metaPeriod"></span></div>
        <div><strong>Comparison</strong> <span id="metaComparison"></span></div>
      </div>
    </div>

    <!-- Sections are rendered in enabled_sections order from the API -->
    <div id="sections"></div>

    <div class="rpt-footer">
      <div>Prepared by <strong>Rocky Mountain Co.</strong> — Confidential</div>
    </div>
  </div>
  </div><!-- /.rpt-layout -->

<script>
const $ = id => document.getElementById(id);

// ── URL state ─────────────────────────────────────────────────────────────────
const qs = new URLSearchParams(location.search);
let currentBrand  = qs.get('brand')  || '';
// Last full calendar month is the default: it's the report RMC actually sends brands.
let currentPeriod = qs.get('period') || 'lastMonth';
const PRINT_MODE  = qs.get('print') === '1';
if (PRINT_MODE) document.body.classList.add('print-mode');

// Must track REPORT_SCHEMA_VERSION in server.js. A snapshot stamped with a
// different version was saved under an older report format.
const REPORT_SCHEMA_VERSION = 1;

// ── Formatters ────────────────────────────────────────────────────────────────
const fmtC = (v, sym = 'CA$') => (v == null || isNaN(v)) ? '—' : sym + Math.round(v).toLocaleString('en-US');
const fmtN = v => v == null ? '—' : Number(v).toLocaleString('en-US');
const fmtPct = (v, d = 1) => v == null || isNaN(v) ? '—' : (Math.round(v * Math.pow(10, d)) / Math.pow(10, d)) + '%';

// ── Data coverage ─────────────────────────────────────────────────────────────
// A zero in this data means one of two very different things: the brand really
// sold/spent nothing, or we never had the data. The table can't distinguish them
// (0, not NULL), so the renderer must not present one as the other — a report
// telling a brand they did $0 last year when we simply lack the year is worse
// than showing nothing at all.
//
// d.coverage carries the earliest date we hold each kind of data. Anything
// before that is unknowable, so say "no data", never "$0".

function coverageState(d, kind, from, to) {
  const boundary = kind === 'ads' ? d.coverage?.adsFrom : d.coverage?.revenueFrom;
  if (!boundary) return { state: 'unknown', boundary: null };
  if (to   <  boundary) return { state: 'none',    boundary };   // entirely before we had data
  if (from <  boundary) return { state: 'partial', boundary };   // starts before, ends inside
  return { state: 'full', boundary };
}

const fmtDay = iso => {
  if (!iso) return '';
  const [y, m, dd] = iso.split('-').map(Number);
  return new Date(Date.UTC(y, m - 1, dd)).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
};

// Prior-year YTD window, mirroring how the server builds ytdSeriesPrev.
function priorYearWindow(periodTo) {
  const [y, m, d] = periodTo.split('-').map(Number);
  const py = y - 1;
  const pad = n => String(n).padStart(2, '0');
  return { from: `${py}-01-01`, to: `${py}-${pad(m)}-${pad(d)}` };
}

// Ad data before the boundary isn't "missing pending a backfill" — Amazon only
// retains ~95 days of report history, so it aged out before we ever pulled it
// and is gone for good. Worth saying plainly: someone will otherwise keep
// trying to recover it (I did, twice).
function adsNoDataHtml(cov) {
  return `<div class="rpt-placeholder">
    <strong>No advertising data for this period.</strong> Our ad records begin
    ${fmtDay(cov.boundary)}. Amazon retains roughly 95 days of advertising report
    history, so earlier periods can't be recovered. This is missing data — not
    evidence that no ads ran.
  </div>`;
}

function adsPartialNoteHtml(cov, d) {
  return `<div class="rpt-note">Advertising figures cover ${fmtDay(cov.boundary)} – ${fmtDay(d.period.to)} only.
    Ad records don't reach the start of this period, so ad totals understate the full window.</div>`;
}
const fmt2 = v => v == null || isNaN(v) ? '—' : (Math.round(v * 100) / 100).toFixed(2);

function pct(curr, prev) {
  if (!prev || prev === 0) return null;
  return Math.round((curr - prev) / prev * 1000) / 10;
}
function deltaHtml(curr, prev) {
  const p = pct(curr, prev);
  if (p === null) return '<span class="delta neu">—</span>';
  return `<span class="delta ${p >= 0 ? 'pos' : 'neg'}">${p >= 0 ? '+' : ''}${p}%</span>`;
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ── Section renderers ─────────────────────────────────────────────────────────
const SECTION_TITLES = {
  executive_summary:   'Executive Summary',
  headline_tiles:      'Performance Highlights',
  sales_trend:         'Revenue Trend',
  ytd_chart:           'Year to Date',
  top_sellers:         'Top Sellers',
  ad_trend:            'Advertising Trend',
  ad_summary:          'Advertising Performance',
  inventory_status:    'Inventory Status',
  revenue_share_pie: 'Revenue Share by Product',
  per_asin_detail: 'Per-ASIN Detail',
};

const SECTION_RENDERERS = {
  executive_summary: () => `
    <div id="execSummaryWrap">
      <div id="execSummaryStatus" class="exec-status"></div>

      <!-- Shown when no summary exists yet. Nothing is generated automatically:
           opening a report must never cost money. Two explicit routes in —
           writing it yourself is free and never touches the API. -->
      <div id="execEmpty" class="exec-empty" style="display:none;">
        <p>No executive summary for this period yet.</p>
        <div class="exec-empty-actions">
          <button id="execWriteBtn"    class="exec-btn-secondary" type="button">Write it myself</button>
          <button id="execGenerateBtn" class="exec-btn"           type="button">Generate with AI</button>
        </div>
        <p class="exec-empty-hint">Writing it yourself is free. Generating uses Claude — a paid API call.</p>
      </div>

      <textarea id="execSummaryText" class="exec-textarea" spellcheck="true" style="display:none;"
        placeholder="Write the executive summary — headline numbers and what drove them, product callouts, advertising, and what to watch next."></textarea>
      <!-- No Regenerate button by design (Mike, 2026-07-15). Once a summary
           exists — written or generated — there is deliberately no one-click
           path to another paid Claude call. Generation happens once, from the
           empty state. To redo one, clear the text and save. -->
      <div class="exec-actions" id="execActions" style="display:none;">
        <span id="execSummaryMeta" class="exec-meta"></span>
        <div class="exec-buttons">
          <button id="execSaveBtn" class="exec-btn" type="button" disabled>Save</button>
        </div>
      </div>
    </div>`,

  headline_tiles: (d) => {
    const s = d.summary, sp = d.summaryPrev || {};
    const conv = s.sessions ? s.units / s.sessions * 100 : null;
    const tile = (label, value, change, prev) => {
      const cls = change == null ? 'neu' : change >= 0 ? 'pos' : 'neg';
      const chg = change == null ? '' : `<div class="tile-change ${cls}">${change >= 0 ? '+' : ''}${change}% vs prior</div>`;
      const prv = prev ? `<div class="tile-prev">${prev}</div>` : '';
      return `<div class="tile"><div class="tile-label">${label}</div><div class="tile-value">${value}</div>${chg}${prv}</div>`;
    };

    // Only render a marketplace's revenue tile when that marketplace actually
    // has data — current period or prior. Showing "US$0" on a CA-only brand is
    // noise. Labels name the MARKETPLACE, not just the currency, so adding
    // Walmart later doesn't silently read as the same line item.
    // NOTE: the data model still keys on currency, so amazon_ca and a future
    // walmart_ca would collapse. See the Notion entry on multi-marketplace.
    const marketplaces = [
      { label: 'Revenue — Amazon.ca (CA$)', sym: 'CA$',  cur: s.revenueCad, prev: sp.revenueCad },
      { label: 'Revenue — Amazon.com (US$)', sym: 'US$', cur: s.revenueUsd, prev: sp.revenueUsd },
    ].filter(mp => (mp.cur || 0) > 0 || (mp.prev || 0) > 0);

    const revTiles = marketplaces.map(mp =>
      tile(mp.label, fmtC(mp.cur, mp.sym), pct(mp.cur, mp.prev), 'Prior: ' + fmtC(mp.prev, mp.sym))
    ).join('');

    return `<div class="tiles">
      ${revTiles}
      ${tile('Units Sold', fmtN(s.units), pct(s.units, sp.units), 'Prior: ' + fmtN(sp.units))}
      ${tile('Sessions', fmtN(s.sessions), null, null)}
      ${tile('Conversion (CVR)', fmtPct(conv), null, 'Units ÷ sessions')}
      ${tile('Buy Box %', fmtPct(s.buyBox), null, 'Avg across products')}
    </div>`;
  },

  sales_trend: () => `<div class="chart-wrap"><canvas id="salesChart"></canvas></div>`,

  ytd_chart: (d) => {
    const cy = d.ytdSeries     || [];
    const py = d.ytdSeriesPrev || [];
    const cyTotal = cy.reduce((s, x) => s + (x.revCad + x.revUsd), 0);
    const pyTotal = py.reduce((s, x) => s + (x.revCad + x.revUsd), 0);

    // The prior year is the single worst place to render a zero we can't stand
    // behind: "Prior YTD $0" tells a brand they sold nothing last year. If the
    // prior-year window sits entirely before our data begins, we don't know
    // what they did — so say that, and drop the meaningless delta with it.
    const pw     = priorYearWindow(d.period.to);
    const pyCov  = coverageState(d, 'revenue', pw.from, pw.to);
    const pyKnown = pyCov.state === 'full' || pyCov.state === 'partial' || pyCov.state === 'unknown';
    const delta  = (pyKnown && pyTotal > 0) ? Math.round((cyTotal - pyTotal) / pyTotal * 1000) / 10 : null;

    const pyValue = pyKnown ? fmtC(pyTotal, '$') : 'No data';
    const pySub   = !pyKnown
      ? `Our data begins ${fmtDay(pyCov.boundary)}`
      : (delta != null ? (delta >= 0 ? '+' : '') + delta + '% vs prior'
                       : (pyCov.state === 'partial' ? `Partial — data begins ${fmtDay(pyCov.boundary)}` : '—'));

    return `
      <div style="display:grid;grid-template-columns:1fr 200px;gap:24px;align-items:start;">
        <div class="chart-wrap" style="height:240px"><canvas id="ytdChart"></canvas></div>
        <div>
          <div class="ad-stat" style="margin-bottom:10px"><div class="ad-stat-label">Current YTD</div><div class="ad-stat-value">${fmtC(cyTotal, '$')}</div><div class="ad-stat-sub">${cy.length} days</div></div>
          <div class="ad-stat"><div class="ad-stat-label">Prior YTD</div><div class="ad-stat-value${pyKnown ? '' : ' ad-stat-nodata'}">${pyValue}</div><div class="ad-stat-sub">${pySub}</div></div>
        </div>
      </div>
      ${!pyKnown ? `<div class="rpt-note">Prior-year comparison unavailable — our records begin ${fmtDay(pyCov.boundary)}. The chart shows this year only.</div>` : ''}`;
  },

  top_sellers: (d) => {
    const TOP_N = 10;
    const active = (d.products || []).filter(p => (p.revenueCad + p.revenueUsd + p.units) > 0);
    // Genuinely "top" sellers: ranked by combined revenue, capped at 10.
    // (Previously this listed every product with any activity, which for a
    // brand like Zellies meant the whole catalogue.)
    const ranked = [...active].sort((a, b) =>
      (b.revenueCad + b.revenueUsd) - (a.revenueCad + a.revenueUsd)
    ).slice(0, TOP_N);

    // Drop a currency column entirely if no shown product has revenue in it.
    const showCad = ranked.some(p => (p.revenueCad || 0) > 0);
    const showUsd = ranked.some(p => (p.revenueUsd || 0) > 0);

    // Inventory deliberately omitted: the counts aren't reliable enough to put
    // in front of a brand (Mike, 2026-07-14).
    const rows = ranked.map(p => {
      const full = p.title || p.asin;
      const titleShort = full.length > 60 ? full.slice(0, 60) + '…' : full;
      // title attr gives the untruncated name on hover.
      return `<tr>
        <td><span class="product-title" title="${escapeHtml(full)}">${escapeHtml(titleShort)}</span><div class="product-asin">${escapeHtml(p.asin)}</div></td>
        ${showCad ? `<td class="r">${fmtC(p.revenueCad)}</td>` : ''}
        ${showUsd ? `<td class="r">${fmtC(p.revenueUsd, 'US$')}</td>` : ''}
        <td class="r">${fmtN(p.units)}</td>
        <td class="r">${fmtN(p.sessions)}</td>
        <td class="r">${fmtPct(p.buyBox)}</td>
        <td class="r">${deltaHtml(p.units, p.prev?.units)}</td>
      </tr>`;
    }).join('');

    const cols = 5 + (showCad ? 1 : 0) + (showUsd ? 1 : 0);
    const more = active.length > TOP_N
      ? `<div class="rpt-note">Showing top ${TOP_N} of ${active.length} products by revenue.</div>` : '';

    return `<table class="rpt-table">
      <thead><tr>
        <th>Product</th>
        ${showCad ? '<th class="r">Rev CA$</th>' : ''}
        ${showUsd ? '<th class="r">Rev US$</th>' : ''}
        <th class="r">Units</th><th class="r">Sessions</th><th class="r">Buy Box</th>
        <th class="r">Δ Units</th>
      </tr></thead>
      <tbody>${rows || `<tr><td colspan="${cols}" style="text-align:center;color:var(--text-3)">No products with activity in this period.</td></tr>`}</tbody>
    </table>${more}`;
  },

  // Revenue share by ASIN — OPTIONAL section, off by default.
  //
  // Labels use the SUPPLIER name, not the Amazon title (Mike): "Original 12pk"
  // reads; "Zellies Cool Mint Mints, Pouch, 540 ct, Sugar Free..." does not.
  // Only ~17% of ASINs carry a supplier name today, so anything missing one
  // falls back to a truncated Amazon title and is called out beneath the chart —
  // silently mixing naming schemes would make the chart quietly untrustworthy.
  revenue_share_pie: (d) => {
    const slices = revenueShareSlices(d);
    if (!slices.length) return `<div class="rpt-placeholder">No product revenue in this period.</div>`;

    const total = slices.reduce((s, x) => s + x.revenue, 0);
    const legend = slices.map((s, i) => `
      <div class="pie-legend-row">
        <span class="pie-swatch" style="background:${PIE_COLORS[i % PIE_COLORS.length]}"></span>
        <span class="pie-legend-name">
          ${escapeHtml(s.label)}
          ${s.asin ? `<span class="pie-legend-asin">${escapeHtml(s.asin)}</span>` : ''}
        </span>
        <span class="pie-legend-pct">${(s.revenue / total * 100).toFixed(1)}%</span>
      </div>`).join('');

    const unnamed = slices.filter(s => s.asin && !s.named).length;
    const note = unnamed
      ? `<div class="rpt-note">${unnamed} product${unnamed === 1 ? ' has' : 's have'} no supplier name, so the Amazon title is shown instead. Set supplier names in Product Data for cleaner labels.</div>`
      : '';

    return `
      <div class="pie-wrap">
        <div class="pie-chart-box"><canvas id="revenueShareChart"></canvas></div>
        <div class="pie-legend">${legend}</div>
      </div>${note}`;
  },

  ad_trend: (d) => {
    const days = d.dailySeries || [];
    const cov  = coverageState(d, 'ads', d.period.from, d.period.to);
    if (cov.state === 'none') return adsNoDataHtml(cov);
    const hasAds = days.some(x => (x.spendCad + x.spendUsd) > 0);
    if (!hasAds) return `<div class="rpt-placeholder">No advertising activity in this period.</div>`;
    return `<div class="chart-wrap" style="height:260px"><canvas id="adTrendChart"></canvas></div>
      ${cov.state === 'partial' ? adsPartialNoteHtml(cov, d) : ''}`;
  },

  ad_summary: (d) => {
    const cov = coverageState(d, 'ads', d.period.from, d.period.to);
    if (cov.state === 'none') return adsNoDataHtml(cov);
    const ad = d.summary?.adSummary;
    if (!ad) return `<div class="rpt-placeholder">No advertising activity in this period.</div>`;
    const stat = (label, value, sub) => `<div class="ad-stat"><div class="ad-stat-label">${label}</div><div class="ad-stat-value">${value}</div>${sub ? `<div class="ad-stat-sub">${sub}</div>` : ''}</div>`;
    const totalSpend = (ad.spendCad || 0) + (ad.spendUsd || 0);
    const totalAttr  = (ad.attributedSalesCad || 0) + (ad.attributedSalesUsd || 0);
    return `
      <div class="ad-grid">
        ${stat('Total Ad Sales', fmtC(totalAttr, '$'), `CAD ${fmtC(ad.attributedSalesCad)} · USD ${fmtC(ad.attributedSalesUsd, 'US$')}`)}
        ${stat('Total Spend',    fmtC(totalSpend, '$'), `CAD ${fmtC(ad.spendCad)} · USD ${fmtC(ad.spendUsd, 'US$')}`)}
        ${stat('ACOS',           fmtPct(ad.acos), 'Spend ÷ ad sales')}
        ${stat('ROAS',           ad.roas != null ? ad.roas.toFixed(2) + 'x' : '—', 'Ad sales ÷ spend')}
      </div>
      <div class="ad-section-sub">Vs total business</div>
      <div class="ad-grid">
        ${stat('TACOS',          fmtPct(ad.tacos), 'Spend ÷ total revenue')}
        ${stat('Impressions',    fmtN(ad.impressions))}
        ${stat('Clicks',         fmtN(ad.clicks), `CTR ${fmtPct(ad.ctr, 2)} · CPC $${fmt2(ad.cpc)}`)}
      </div>
      <div class="ad-section-sub">Engagement</div>
      <div class="ad-grid">
        ${stat('Ad Orders',      fmtN(ad.orders), `Ad CVR ${fmtPct(ad.adCvr)}`)}
        ${stat('Ad CVR',         fmtPct(ad.adCvr), 'Orders ÷ clicks')}
        ${stat('CPC',            ad.cpc != null ? '$' + fmt2(ad.cpc) : '—', 'Cost per click')}
        ${stat('CTR',            fmtPct(ad.ctr, 2), 'Clicks ÷ impressions')}
      </div>
      ${cov.state === 'partial' ? adsPartialNoteHtml(cov, d) : ''}`;
  },

  inventory_status: (d) => {
    // Days of cover = on-hand ÷ daily velocity (units in period / period days).
    // Period length from the resolved dates so we work for last7d/last30d/etc.
    const products = d.products || [];
    const periodDays = Math.max(1, Math.round((new Date(d.period.to) - new Date(d.period.from)) / 86400000) + 1);
    let low = 0, warn = 0, good = 0, missing = 0;
    const rows = [];
    for (const p of products) {
      const stock = p.inventory?.onHand;
      if (stock == null) { missing++; continue; }
      const velocity = (p.units || 0) / periodDays;  // units per day
      const days = velocity > 0 ? Math.round(stock / velocity) : null;
      if (stock <= 0)        low++;
      else if (stock < 30)   low++;
      else if (stock < 100)  warn++;
      else                   good++;
      rows.push({ asin: p.asin, title: p.title || p.asin, stock, velocity, days });
    }
    // Lowest days-of-cover first (only with positive velocity, treat unknown as deprioritized).
    rows.sort((a, b) => {
      if (a.days == null && b.days == null) return 0;
      if (a.days == null) return 1;
      if (b.days == null) return -1;
      return a.days - b.days;
    });
    const top = rows.slice(0, 10);

    const tableRows = top.map(r => {
      const titleShort = (r.title.length > 50 ? r.title.slice(0, 50) + '…' : r.title);
      let cls = 'good';
      if (r.days == null) cls = '';
      else if (r.days < 14) cls = 'low';
      else if (r.days < 30) cls = 'warn';
      const daysLabel = r.days == null ? '— (no velocity)' : (r.days + ' days');
      return `<tr>
        <td><span class="product-title">${escapeHtml(titleShort)}</span><div class="product-asin">${escapeHtml(r.asin)}</div></td>
        <td class="r">${fmtN(r.stock)}</td>
        <td class="r">${r.velocity > 0 ? r.velocity.toFixed(1) + '/day' : '—'}</td>
        <td class="r">${cls ? `<span class="stock-chip ${cls}">${daysLabel}</span>` : daysLabel}</td>
      </tr>`;
    }).join('');

    return `
      <div class="ad-grid">
        <div class="ad-stat"><div class="ad-stat-label">Healthy stock</div><div class="ad-stat-value" style="color:var(--pos)">${good}</div><div class="ad-stat-sub">100+ units on hand</div></div>
        <div class="ad-stat"><div class="ad-stat-label">Warning</div><div class="ad-stat-value" style="color:var(--amber)">${warn}</div><div class="ad-stat-sub">30–99 units</div></div>
        <div class="ad-stat"><div class="ad-stat-label">Low / out</div><div class="ad-stat-value" style="color:var(--neg)">${low}</div><div class="ad-stat-sub">Under 30 units</div></div>
        <div class="ad-stat"><div class="ad-stat-label">No data</div><div class="ad-stat-value" style="color:var(--text-3)">${missing}</div><div class="ad-stat-sub">Inventory not synced</div></div>
      </div>
      ${top.length ? `
      <div class="ad-section-sub">Lowest days of cover</div>
      <table class="rpt-table">
        <thead><tr><th>Product</th><th class="r">On hand</th><th class="r">Velocity</th><th class="r">Days of cover</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>` : ''}`;
  },

  // Full per-ASIN breakdown. Top Sellers answers "what's winning"; this answers
  // "what happened to everything". Paginated on screen so it doesn't bury the
  // rest of the report — but print mode renders EVERY row (see initPerAsinTable),
  // because a PDF silently truncated to page 1 is worse than no table.
  per_asin_detail: () => `
    <div id="perAsinWrap">
      <div id="perAsinTableWrap"></div>
      <div id="perAsinFoot" class="per-asin-foot">
        <div id="perAsinCount" class="rpt-note"></div>
        <div id="perAsinPager" class="per-asin-pager"></div>
      </div>
    </div>`,
};

// ── Report layout: section toggles + drag-to-reorder ─────────────────────────
//
// Pinned sections are fixed in place AND always on (Mike): no checkbox, no grip.
// The report renders in the brand's own order, and changes persist as that
// brand's default — a saved report freezes whatever layout was active when it
// was saved, so old reports never shift when the default later changes.
//
// The server is authoritative about what's pinned/movable; these are only the
// client's defaults for when a payload predates those fields.
let layout = {
  brandId: null,
  hidden: new Set(),
  order: [],
  movable: [],
  pinned: ['executive_summary', 'per_asin_detail'],
  saving: false,
  dragKey: null,
};

function isPinned(key) { return layout.pinned.includes(key); }

function setLayoutStatus(msg, isErr = false) {
  const el = document.getElementById('spStatus');
  if (!el) return;
  el.textContent = msg || '';
  el.className = 'sp-status' + (isErr ? ' err' : '');
}

function initLayoutPanel(d) {
  const panel = document.getElementById('sectionPanel');
  if (!panel) return;

  // No controls in a PDF, and a saved report's layout is frozen by definition.
  if (PRINT_MODE || currentSavedId) { panel.style.display = 'none'; return; }
  panel.style.display = '';

  const cfg = d.config || {};
  layout.brandId = d.brand.id;
  layout.hidden  = new Set(cfg.hidden_sections || []);
  layout.movable = cfg.movable_sections || [];
  layout.pinned  = cfg.pinned_sections  || layout.pinned;
  layout.order   = cfg.section_order?.length ? cfg.section_order : layout.movable;
  renderLayoutPanel();
}

function renderLayoutPanel() {
  const list = document.getElementById('spList');
  if (!list) return;

  // Mirrors the server's render order so the panel reads top-to-bottom like the
  // report itself — a list in a different order to the thing it controls is a
  // puzzle, not a control.
  const rows = [
    { key: layout.pinned[0], pinned: true },
    ...layout.order.map(k => ({ key: k, pinned: false })),
    { key: layout.pinned[1], pinned: true },
  ].filter(r => r.key);

  list.innerHTML = rows.map(r => {
    const title = SECTION_TITLES[r.key] || r.key;
    if (r.pinned) {
      return `<div class="sp-row sp-row-pinned" data-key="${r.key}" title="Always on — this section is part of the report's structure">
        <span class="sp-grip sp-grip-locked">🔒</span>
        <span class="sp-name">${escapeHtml(title)}</span>
        <span class="sp-always">Always on</span>
      </div>`;
    }
    const on = !layout.hidden.has(r.key);
    return `<div class="sp-row" draggable="true" data-key="${r.key}">
      <span class="sp-grip" title="Drag to reorder">⠿</span>
      <label class="sp-name">
        <input type="checkbox" data-toggle="${r.key}" ${on ? 'checked' : ''} />
        <span>${escapeHtml(title)}</span>
      </label>
    </div>`;
  }).join('');

  list.querySelectorAll('input[data-toggle]').forEach(cb => {
    cb.addEventListener('change', () => {
      const key = cb.dataset.toggle;
      if (cb.checked) layout.hidden.delete(key); else layout.hidden.add(key);
      persistLayout();
    });
  });

  list.querySelectorAll('.sp-row[draggable="true"]').forEach(row => {
    row.addEventListener('dragstart', e => {
      layout.dragKey = row.dataset.key;
      row.classList.add('sp-dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Firefox won't start a drag without payload.
      e.dataTransfer.setData('text/plain', row.dataset.key);
    });
    row.addEventListener('dragend', () => { row.classList.remove('sp-dragging'); layout.dragKey = null; clearDropMarkers(); });
    row.addEventListener('dragover', e => {
      if (!layout.dragKey || layout.dragKey === row.dataset.key) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      clearDropMarkers();
      row.classList.add('sp-drop-target');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      clearDropMarkers();
      const from = layout.dragKey, to = row.dataset.key;
      if (!from || from === to) return;
      reorderSection(from, to);
    });
  });
}

function clearDropMarkers() {
  document.querySelectorAll('.sp-drop-target, .rpt-section-drop').forEach(el =>
    el.classList.remove('sp-drop-target', 'rpt-section-drop'));
}

// Dragging the sections in the report itself. Shares layout.order and
// persistLayout with the side panel, so the two can't disagree about the order.
function wireSectionDrag(root) {
  root.querySelectorAll('.rpt-section-draggable').forEach(sec => {
    sec.addEventListener('dragstart', e => {
      layout.dragKey = sec.dataset.section;
      sec.classList.add('rpt-section-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', sec.dataset.section);
    });
    sec.addEventListener('dragend', () => {
      sec.classList.remove('rpt-section-dragging');
      layout.dragKey = null;
      clearDropMarkers();
    });
    sec.addEventListener('dragover', e => {
      if (!layout.dragKey || layout.dragKey === sec.dataset.section) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      clearDropMarkers();
      sec.classList.add('rpt-section-drop');
    });
    sec.addEventListener('drop', e => {
      e.preventDefault();
      clearDropMarkers();
      const from = layout.dragKey, to = sec.dataset.section;
      if (!from || from === to) return;
      reorderSection(from, to);
    });
  });
}

function reorderSection(fromKey, toKey) {
  const order = [...layout.order];
  const fi = order.indexOf(fromKey), ti = order.indexOf(toKey);
  if (fi === -1 || ti === -1) return;      // pinned rows aren't in `order`
  order.splice(fi, 1);
  order.splice(ti, 0, fromKey);
  layout.order = order;
  renderLayoutPanel();
  persistLayout();
}

// Persist, then re-render from the server's response so what's on screen is
// what's actually stored — not an optimistic guess that might diverge.
async function persistLayout() {
  if (!layout.brandId || layout.saving) return;
  layout.saving = true;
  setLayoutStatus('Saving…');
  try {
    const res = await fetch(`/api/brand-report-config/${encodeURIComponent(layout.brandId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        hidden_sections: [...layout.hidden],
        section_order:   layout.order,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    setLayoutStatus('Saved');
    setTimeout(() => setLayoutStatus(''), 1500);
    layout.saving = false;
    await render();   // re-render the report against the stored layout
  } catch (err) {
    layout.saving = false;
    setLayoutStatus('Not saved — ' + err.message, true);
  }
}

// ── Revenue share pie ─────────────────────────────────────────────────────────

const PIE_TOP_N = 10;

// Distinguishable at a glance in print and on screen, and deliberately not the
// RMC greens — ten shades of one hue is unreadable as a pie. Grey is reserved
// for "All others" so it never reads as a product.
const PIE_COLORS = [
  '#2c3a20', '#4a7c1f', '#9db47e', '#c9a227', '#e08a3c',
  '#a63d40', '#6b4e8f', '#3b7ea1', '#5f9ea0', '#8c6d4f',
];
const PIE_OTHER_COLOR = '#c8c6bc';

/**
 * Top N ASINs by revenue + an "All others" slice.
 *
 * Label is the SUPPLIER name where set, else a truncated Amazon title. `named`
 * records which, so the renderer can say when it fell back rather than passing
 * an Amazon title off as a supplier name.
 */
function revenueShareSlices(d) {
  const products = (d.products || [])
    .map(p => ({
      asin: p.asin,
      revenue: (p.revenueCad || 0) + (p.revenueUsd || 0),
      supplierName: (p.supplierName || '').trim(),
      amazonTitle: (p.amazonTitle || p.title || '').trim(),
    }))
    .filter(p => p.revenue > 0)
    .sort((a, b) => b.revenue - a.revenue);

  if (!products.length) return [];

  const top = products.slice(0, PIE_TOP_N).map(p => {
    const named = !!p.supplierName;
    let label = p.supplierName || p.amazonTitle || p.asin;
    if (!named && label.length > 34) label = label.slice(0, 34) + '…';
    return { asin: p.asin, label, revenue: p.revenue, named };
  });

  const rest = products.slice(PIE_TOP_N);
  if (rest.length) {
    top.push({
      asin: null,
      label: `All others (${rest.length})`,
      revenue: rest.reduce((s, p) => s + p.revenue, 0),
      named: true,
    });
  }
  return top;
}

function buildRevenuePieChart(d) {
  const el = document.getElementById('revenueShareChart');
  if (!el) return;
  if (revenuePieChart) revenuePieChart.destroy();

  const slices = revenueShareSlices(d);
  if (!slices.length) return;
  const total = slices.reduce((s, x) => s + x.revenue, 0);

  revenuePieChart = new Chart(el, {
    type: 'pie',
    data: {
      labels: slices.map(s => s.label),
      datasets: [{
        data: slices.map(s => Math.round(s.revenue * 100) / 100),
        backgroundColor: slices.map((s, i) => s.asin === null ? PIE_OTHER_COLOR : PIE_COLORS[i % PIE_COLORS.length]),
        borderColor: '#fff',
        borderWidth: 1.5,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      // The legend beside the chart already names every slice with its ASIN and
      // share — Chart.js's own legend would just repeat it, worse.
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              const v = ctx.parsed;
              const pct = (v / total * 100).toFixed(1);
              const s = slices[ctx.dataIndex];
              return `${s.label}: ${fmtC(v, '$')} (${pct}%)`;
            },
          },
        },
      },
      // Charts must be fully painted before Puppeteer snapshots the PDF.
      animation: PRINT_MODE ? false : undefined,
    },
  });
}

// ── Per-ASIN detail ───────────────────────────────────────────────────────────

const PER_ASIN_PAGE_SIZE = 25;
let perAsin = { rows: [], page: 0, sortKey: 'revenue', sortDir: 'desc', showCad: true, showUsd: true };

// value:  sorting + emptiness both key off this, so they can never disagree
// render: display only
const PER_ASIN_COLS = [
  { key:'title',    label:'Product',  cls:'',  value:p => (p.title || p.asin).toLowerCase(),
    render:p => {
      const full = p.title || p.asin;
      const short = full.length > 52 ? full.slice(0,52) + '…' : full;
      return `<span class="product-title" title="${escapeHtml(full)}">${escapeHtml(short)}</span>
              <div class="product-asin">${escapeHtml(p.asin)}</div>`;
    } },
  { key:'revenueCad', label:'Rev CA$', cls:'r', cur:'cad', value:p => p.revenueCad || 0, render:p => fmtC(p.revenueCad) },
  { key:'revenueUsd', label:'Rev US$', cls:'r', cur:'usd', value:p => p.revenueUsd || 0, render:p => fmtC(p.revenueUsd, 'US$') },
  { key:'units',      label:'Units',    cls:'r', value:p => p.units || 0,    render:p => fmtN(p.units) },
  { key:'sessions',   label:'Sessions', cls:'r', value:p => p.sessions || 0, render:p => fmtN(p.sessions) },
  { key:'cvr',        label:'CVR',      cls:'r', value:p => p.cvr ?? -1,     render:p => fmtPct(p.cvr) },
  { key:'buyBox',     label:'Buy Box',  cls:'r', value:p => p.buyBox ?? -1,  render:p => fmtPct(p.buyBox) },
  // Ad columns read '—' rather than '$0' when an ASIN had no ad activity at
  // all. A real zero and "no ad data for this period" are different facts and
  // must not look identical — that conflation is what produced "Prior YTD $0".
  { key:'adSpend', label:'Ad Spend', cls:'r', value:p => adSpendOf(p) ?? -1,
    render:p => { const s = adSpendOf(p); return s == null ? '—' : fmtC(s); } },
  { key:'acos', label:'ACOS', cls:'r', value:p => p.acos ?? -1, render:p => fmtPct(p.acos) },
  { key:'roas', label:'ROAS', cls:'r', value:p => p.roas ?? -1,
    render:p => p.roas == null ? '—' : p.roas.toFixed(2) + 'x' },
];

// Combined CAD+USD, matching how buildSku already derives acos/roas. Returns
// null when the ASIN shows no ad activity whatsoever, so "no data" stays
// distinct from a genuine $0.
function adSpendOf(p) {
  const spend = (p.spendCad || 0) + (p.spendUsd || 0);
  if (spend > 0) return spend;
  const touched = (p.adClicks || 0) > 0 || (p.adImpressions || 0) > 0 || (p.adOrders || 0) > 0;
  return touched ? 0 : null;
}

function perAsinSortVal(p, key) {
  if (key === 'revenue') return (p.revenueCad || 0) + (p.revenueUsd || 0);
  const col = PER_ASIN_COLS.find(c => c.key === key);
  return col ? col.value(p) : 0;
}

function renderPerAsinTable() {
  const wrap = document.getElementById('perAsinTableWrap');
  if (!wrap) return;

  const cols = PER_ASIN_COLS.filter(c =>
    !(c.cur === 'cad' && !perAsin.showCad) && !(c.cur === 'usd' && !perAsin.showUsd));

  const sorted = [...perAsin.rows].sort((a, b) => {
    const av = perAsinSortVal(a, perAsin.sortKey), bv = perAsinSortVal(b, perAsin.sortKey);
    const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
    return perAsin.sortDir === 'asc' ? cmp : -cmp;
  });

  // Print renders everything: a PDF has no "next page" button.
  const paged = PRINT_MODE ? sorted
    : sorted.slice(perAsin.page * PER_ASIN_PAGE_SIZE, (perAsin.page + 1) * PER_ASIN_PAGE_SIZE);

  const head = cols.map(c => {
    const active = perAsin.sortKey === c.key || (c.key === 'revenueCad' && perAsin.sortKey === 'revenue');
    const arrow  = active ? (perAsin.sortDir === 'asc' ? ' ▲' : ' ▼') : '';
    return PRINT_MODE
      ? `<th class="${c.cls}">${escapeHtml(c.label)}</th>`
      : `<th class="${c.cls} sortable${active ? ' sorted' : ''}" data-sort="${c.key}">${escapeHtml(c.label)}${arrow}</th>`;
  }).join('');

  const body = paged.map(p =>
    `<tr>${cols.map(c => `<td class="${c.cls}">${c.render(p)}</td>`).join('')}</tr>`
  ).join('');

  wrap.innerHTML = `<table class="rpt-table per-asin-table">
      <thead><tr>${head}</tr></thead>
      <tbody>${body || `<tr><td colspan="${cols.length}" style="text-align:center;color:var(--text-3);padding:20px">No products with activity in this period.</td></tr>`}</tbody>
    </table>`;

  if (!PRINT_MODE) {
    wrap.querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (perAsin.sortKey === key) perAsin.sortDir = perAsin.sortDir === 'asc' ? 'desc' : 'asc';
      else { perAsin.sortKey = key; perAsin.sortDir = key === 'title' ? 'asc' : 'desc'; }
      perAsin.page = 0;
      renderPerAsinTable();
    }));
  }
  renderPerAsinFoot(sorted.length);
}

function renderPerAsinFoot(total) {
  const countEl = document.getElementById('perAsinCount');
  const pagerEl = document.getElementById('perAsinPager');
  if (!countEl || !pagerEl) return;

  if (PRINT_MODE || total <= PER_ASIN_PAGE_SIZE) {
    countEl.textContent = total ? `${total} product${total === 1 ? '' : 's'} with activity in this period.` : '';
    pagerEl.innerHTML = '';
    return;
  }
  const pages = Math.ceil(total / PER_ASIN_PAGE_SIZE);
  const from  = perAsin.page * PER_ASIN_PAGE_SIZE + 1;
  const to    = Math.min((perAsin.page + 1) * PER_ASIN_PAGE_SIZE, total);
  countEl.textContent = `Showing ${from}–${to} of ${total} products with activity.`;
  pagerEl.innerHTML = `
    <button class="pg-btn" id="pgPrev" ${perAsin.page === 0 ? 'disabled' : ''}>Previous</button>
    <span class="pg-info">Page ${perAsin.page + 1} of ${pages}</span>
    <button class="pg-btn" id="pgNext" ${perAsin.page >= pages - 1 ? 'disabled' : ''}>Next</button>`;
  const prev = document.getElementById('pgPrev'), next = document.getElementById('pgNext');
  if (prev) prev.addEventListener('click', () => { if (perAsin.page > 0) { perAsin.page--; renderPerAsinTable(); } });
  if (next) next.addEventListener('click', () => { if (perAsin.page < pages - 1) { perAsin.page++; renderPerAsinTable(); } });
}

function initPerAsinTable(d) {
  // "Activity" is deliberately broader than Top Sellers' revenue filter: an
  // ASIN with sessions but no sales, or spend but no sales, is exactly what a
  // detail view exists to surface. Only fully-dormant ASINs are dropped.
  const rows = (d.products || []).filter(p =>
    (p.units || 0) > 0 || (p.revenueCad || 0) > 0 || (p.revenueUsd || 0) > 0 ||
    (p.sessions || 0) > 0 || ((p.spendCad || 0) + (p.spendUsd || 0)) > 0);

  perAsin = {
    rows, page: 0, sortKey: 'revenue', sortDir: 'desc',
    showCad: rows.some(p => (p.revenueCad || 0) > 0),
    showUsd: rows.some(p => (p.revenueUsd || 0) > 0),
  };
  // Never hide both currency columns (a period with sessions but no sales).
  if (!perAsin.showCad && !perAsin.showUsd) perAsin.showCad = true;
  renderPerAsinTable();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    // Populate brand selector
    const brandsRes = await fetch('/api/brands?preset=last30d', { credentials: 'include' });
    const brandsData = await brandsRes.json();
    const brandList = (brandsData.brands || [])
      .filter(b => b.id !== 'unknown-brand')
      .sort((a, b) => a.name.localeCompare(b.name));

    if (!currentBrand && brandList.length) currentBrand = brandList[0].id;

    const sel = $('brandSelect');
    sel.innerHTML = brandList.map(b => `<option value="${b.id}" ${b.id === currentBrand ? 'selected' : ''}>${escapeHtml(b.name)}</option>`).join('');
    // Changing brand or period always drops you back to the live view — a
    // saved report belongs to one brand+period, so keeping it selected would lie.
    sel.addEventListener('change', () => {
      currentBrand = sel.value; currentSavedId = null;
      loadSavedReports(currentBrand); updateUrl(); render();
    });

    const periodSel = $('periodSelect');
    periodSel.value = currentPeriod;
    periodSel.addEventListener('change', () => {
      currentPeriod = periodSel.value; currentSavedId = null;
      $('savedSelect').value = ''; updateUrl(); render();
    });

    const savedSel = $('savedSelect');
    if (savedSel) savedSel.addEventListener('change', () => {
      currentSavedId = savedSel.value || null;
      updateUrl(); render();
    });

    const backBtn = $('backToLiveBtn');
    if (backBtn) backBtn.addEventListener('click', () => {
      currentSavedId = null;
      if (savedSel) savedSel.value = '';
      updateUrl(); render();
    });

    const pdfBtn = $('pdfBtn');
    if (pdfBtn) pdfBtn.addEventListener('click', generatePdf);
    const saveBtn = $('saveBtn');
    if (saveBtn) saveBtn.addEventListener('click', saveReport);
    const delBtn = $('deleteBtn');
    if (delBtn) delBtn.addEventListener('click', deleteSavedReport);

    await loadSavedReports(currentBrand);
    await render();
  } catch (err) {
    console.error('init failed', err);
    $('loading').innerHTML = `<div style="color:var(--neg)">Failed to load: ${escapeHtml(err.message)}</div>`;
  }
}

// ── Saved reports ─────────────────────────────────────────────────────────────
// currentSavedId !== null means we're viewing a frozen snapshot, not live data.
let currentSavedId = qs.get('saved') || null;
let savedReportsCache = [];

// Pure history list. "Live" isn't a saved report, so it isn't an option here —
// the way back to live is the banner's "Back to live view" button.
async function loadSavedReports(brandId) {
  const sel = $('savedSelect');
  if (!sel) return;
  const ph = label => `<option value="" disabled ${currentSavedId ? '' : 'selected'}>${label}</option>`;
  try {
    const res  = await fetch(`/api/brand-report-archives/${encodeURIComponent(brandId)}?limit=50`, { credentials: 'include' });
    const data = await res.json();
    savedReportsCache = (data.archives || []).filter(a => a.is_saved_report !== false);
    if (!savedReportsCache.length) {
      sel.innerHTML = ph('No saved reports');
      sel.disabled = true;
      return;
    }
    sel.disabled = false;
    sel.innerHTML = ph('Select a saved report…') + savedReportsCache.map(a => {
      const d = new Date(a.generated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `<option value="${a.id}" ${a.id === currentSavedId ? 'selected' : ''}>${escapeHtml(a.period_label || (a.period_from + ' → ' + a.period_to))} · saved ${escapeHtml(d)}</option>`;
    }).join('');
  } catch {
    sel.innerHTML = ph('No saved reports');
    sel.disabled = true;
  }
}

// Delete only makes sense while looking at a saved report.
function refreshDeleteBtn() {
  const btn = $('deleteBtn');
  if (!btn) return;
  btn.style.display = currentSavedId ? 'inline-block' : 'none';
}

async function deleteSavedReport() {
  const btn = $('deleteBtn');
  if (!btn || !currentSavedId) return;
  const rec = savedReportsCache.find(a => a.id === currentSavedId);
  const label = rec ? (rec.period_label || `${rec.period_from} → ${rec.period_to}`) : 'this report';
  // Permanent, and it destroys the record of what the brand was actually
  // sent — so spell that out rather than a bare "are you sure?".
  if (!confirm(`Delete the saved report for ${label}?\n\nThis permanently removes the frozen record of this period. It can't be undone — you'd have to re-save from the live view, and the figures may have changed since.`)) return;

  const txt = btn.textContent;
  btn.disabled = true; btn.textContent = 'Deleting…';
  try {
    const res = await fetch(`/api/brand-report-archives/${encodeURIComponent(currentBrand)}/${encodeURIComponent(currentSavedId)}`,
      { method: 'DELETE', credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    // Deleted what we were looking at — drop back to live.
    currentSavedId = null;
    await loadSavedReports(currentBrand);
    updateUrl();
    await render();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = txt;
    refreshDeleteBtn();
  }
}

// Enable "Save report" only when there's a summary to save and we're live.
// A summary is NOT required to save — the numbers are worth freezing on their
// own. Only blocked while already viewing a saved report, or mid-generation
// (where we'd otherwise snapshot a summary that's about to change).
function refreshSaveBtn() {
  const btn = $('saveBtn');
  if (!btn) return;
  btn.disabled = !!currentSavedId || execState.generating;
  btn.title = execState.generating ? 'Waiting for the summary to finish generating…'
            : currentSavedId ? 'Viewing a saved report'
            : 'Freeze these figures as a permanent record';
}

async function saveReport() {
  const btn = $('saveBtn');
  if (!btn || currentSavedId) return;
  const textarea = document.getElementById('execSummaryText');
  const noSummary = !(textarea && textarea.value.trim());
  const msg = 'Save this report?\n\nIt freezes the numbers and summary as they are now — a permanent record of this period as it stands here. It will not change if the underlying data changes later.'
    + (noSummary ? '\n\nNote: there\'s no executive summary yet, so this saves the figures only.' : '');
  if (!confirm(msg)) return;
  const label = btn.textContent;
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const res = await fetch(`/api/brand-report-archives/${encodeURIComponent(currentBrand)}?period=${encodeURIComponent(currentPeriod)}`,
      { method: 'POST', credentials: 'include' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    await loadSavedReports(currentBrand);
    btn.textContent = 'Saved ✓';
    setTimeout(() => { btn.textContent = label; refreshSaveBtn(); }, 2000);
  } catch (err) {
    alert('Save failed: ' + err.message);
    btn.textContent = label;
    refreshSaveBtn();
  }
}


async function generatePdf() {
  const btn = $('pdfBtn');
  if (!btn || !currentBrand) return;
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Generating…';
  try {
    const url = `/api/brand-report-pdf/${encodeURIComponent(currentBrand)}?period=${encodeURIComponent(currentPeriod)}`;
    const res = await fetch(url, { credentials: 'include' });
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(errBody.error || `HTTP ${res.status}`);
    }
    const blob = await res.blob();
    const cd = res.headers.get('content-disposition') || '';
    const fname = (cd.match(/filename="?([^"]+)"?/) || [, 'brand-report.pdf'])[1];

    const dlUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = dlUrl; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(dlUrl);

  } catch (err) {
    alert('PDF generation failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function updateUrl() {
  const params = new URLSearchParams({ brand: currentBrand, period: currentPeriod });
  if (currentSavedId) params.set('saved', currentSavedId);
  history.replaceState({}, '', `${location.pathname}?${params}`);
}

let currentChart = null;
let currentYtdChart = null;
let currentAdChart  = null;
let revenuePieChart = null;
async function render() {
  $('loading').style.display = 'flex';
  $('report').style.display = 'none';

  try {
    // Viewing a saved report → render its frozen snapshot. Otherwise pull live.
    let d, frozenSummary = null;
    if (currentSavedId) {
      const r = await fetch(`/api/brand-report-archives/${encodeURIComponent(currentBrand)}/${encodeURIComponent(currentSavedId)}`, { credentials: 'include' });
      if (!r.ok) throw new Error(`Saved report returned ${r.status}`);
      const saved = await r.json();
      if (!saved.dataset_snapshot) throw new Error('This saved report has no snapshot (saved before snapshots existed).');
      d = saved.dataset_snapshot;
      frozenSummary = saved.summary_text_snapshot || '';
      const when = new Date(saved.generated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      // Say so if this snapshot predates the current report format, rather than
      // rendering it with today's code and hoping the shapes still line up.
      const stale = (d.schemaVersion ?? 0) !== REPORT_SCHEMA_VERSION;
      $('snapshotBannerText').textContent = stale
        ? `Viewing a saved report from ${when}. It was saved under an earlier report format, so some sections may be missing or differ from how they were saved.`
        : `Viewing a saved report from ${when} — these figures are frozen as saved and won't update.`;
      $('snapshotBanner').style.display = 'flex';
    } else {
      $('snapshotBanner').style.display = 'none';
      const res = await fetch(`/api/brand-report-dataset/${encodeURIComponent(currentBrand)}?period=${encodeURIComponent(currentPeriod)}`, { credentials: 'include' });
      if (!res.ok) throw new Error(`Endpoint returned ${res.status}`);
      d = await res.json();
    }

    $('brandName').textContent     = `${d.brand.name} — Performance Report`;
    $('periodLabel').textContent   = d.period.label;
    $('metaPeriod').textContent    = d.period.label;
    $('metaComparison').textContent = d.comparison.label;

    // Resolve the summary BEFORE rendering sections. In print mode a report
    // with no summary should omit the Executive Summary section entirely
    // rather than emit an empty titled box into the PDF.
    let preloadedSummary = null;
    const enabledRaw = d.config?.enabled_sections || Object.keys(SECTION_RENDERERS);
    if (frozenSummary != null) {
      preloadedSummary = { summary_text: frozenSummary };
    } else if (enabledRaw.includes('executive_summary')) {
      try {
        const sr = await fetch(`/api/brand-report-summary/${encodeURIComponent(d.brand.id)}?from=${d.period.from}&to=${d.period.to}`, { credentials: 'include' });
        preloadedSummary = await sr.json();
      } catch { preloadedSummary = null; }
    }
    const hasSummaryText = !!(preloadedSummary?.summary_text || '').trim();

    // Render only enabled sections, in order.
    const enabled = enabledRaw.filter(key => {
      if (!SECTION_RENDERERS[key]) return false;
      if (key === 'executive_summary' && PRINT_MODE && !hasSummaryText) return false;
      return true;
    });
    // Grip dots let a section be dragged in the report itself, not only in the
    // side panel — pinned sections get none, and neither does print mode.
    const canDrag = !PRINT_MODE && !currentSavedId;
    const sectionsEl = $('sections');
    sectionsEl.innerHTML = enabled
      .map(key => {
        const pinned = (d.config?.pinned_sections || []).includes(key);
        const drag   = canDrag && !pinned;
        return `<div class="rpt-section${drag ? ' rpt-section-draggable' : ''}" data-section="${key}"${drag ? ' draggable="true"' : ''}>
          <div class="rpt-section-title">
            ${drag ? '<span class="rpt-grip" title="Drag to reorder">⠿</span>' : ''}
            ${escapeHtml(SECTION_TITLES[key] || key)}
          </div>
          ${SECTION_RENDERERS[key](d)}
        </div>`;
      })
      .join('');
    if (canDrag) wireSectionDrag(sectionsEl);

    // Build charts after DOM exists.
    if (enabled.includes('sales_trend')) buildChart(d.dailySeries, d.dailySeriesPrev);
    if (enabled.includes('ytd_chart'))   buildYtdChart(d.ytdSeries, d.ytdSeriesPrev);
    if (enabled.includes('ad_trend'))    buildAdTrendChart(d.dailySeries);
    if (enabled.includes('revenue_share_pie')) buildRevenuePieChart(d);
    if (enabled.includes('per_asin_detail')) initPerAsinTable(d);
    initLayoutPanel(d);

    // Initialize executive summary section if visible. Never auto-generates —
    // the summary was already fetched above, so this doesn't re-request it.
    if (enabled.includes('executive_summary')) {
      await initExecSummary(d.brand.id, d.period.from, d.period.to, frozenSummary, preloadedSummary);
    }
    refreshSaveBtn();
    refreshDeleteBtn();

    // Signal to Puppeteer (print-mode PDF render) that this report is
    // fully rendered including charts + cached/generated summary.
    window.reportReady = true;

    $('loading').style.display = 'none';
    $('report').style.display  = 'block';
  } catch (err) {
    console.error('render failed', err);
    $('loading').innerHTML = `<div style="color:var(--neg)">Render failed: ${escapeHtml(err.message)}</div>`;
  }
}

function buildChart(daily, dailyPrev) {
  const el = document.getElementById('salesChart');
  if (!el) return;
  if (currentChart) currentChart.destroy();

  const labels = (daily || []).map(d => d.date);
  const curr   = (daily || []).map(d => Math.round((d.revCad + d.revUsd) * 100) / 100);
  // Align prior series to the SAME label positions, by index
  const prevByIdx = (dailyPrev || []).map(d => Math.round((d.revCad + d.revUsd) * 100) / 100);

  currentChart = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Current period', data: curr,        borderColor: '#537D30', backgroundColor: 'rgba(83,125,48,0.10)', fill: true,  tension: 0.3, borderWidth: 2, pointRadius: 0 },
        { label: 'Prior period',   data: prevByIdx,   borderColor: '#9AAABB', backgroundColor: 'transparent',          fill: false, tension: 0.3, borderWidth: 2, pointRadius: 0, borderDash: [4, 4] },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', align: 'end', labels: { font: { size: 11 }, color: '#5A6A82', usePointStyle: true } },
        tooltip: { mode: 'index', intersect: false },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9AAABB', maxRotation: 0, autoSkip: true } },
        y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 }, color: '#9AAABB', callback: v => '$' + v.toLocaleString() }, beginAtZero: true },
      },
    },
  });
}

// YTD cumulative chart — current YTD (solid) vs prior YTD (dashed), aligned
// by day-of-year so seasonal patterns visually compare across years.
function buildYtdChart(curr, prior) {
  const el = document.getElementById('ytdChart');
  if (!el) return;
  if (currentYtdChart) currentYtdChart.destroy();

  // Cumulative running total per series, indexed by day-of-year
  function cumulative(rows) {
    let acc = 0;
    return (rows || []).map(r => { acc += (r.revCad + r.revUsd); return Math.round(acc * 100) / 100; });
  }
  // Label set: day-of-year for current series (so the X-axis stays in the current year's calendar)
  const labels   = (curr  || []).map(r => r.date);
  const currCum  = cumulative(curr);
  const priorCum = cumulative(prior);

  currentYtdChart = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Current YTD', data: currCum,  borderColor: '#537D30', backgroundColor: 'rgba(83,125,48,0.10)', fill: true,  tension: 0.2, borderWidth: 2, pointRadius: 0 },
        { label: 'Prior YTD',   data: priorCum, borderColor: '#9AAABB', backgroundColor: 'transparent',          fill: false, tension: 0.2, borderWidth: 2, pointRadius: 0, borderDash: [4, 4] },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', align: 'end', labels: { font: { size: 11 }, color: '#5A6A82', usePointStyle: true } },
        tooltip: { mode: 'index', intersect: false, callbacks: { label: ctx => ctx.dataset.label + ': $' + Number(ctx.parsed.y).toLocaleString() } },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9AAABB', maxRotation: 0, autoSkip: true, maxTicksLimit: 12 } },
        y: { grid: { color: '#F1F5F9' }, ticks: { font: { size: 10 }, color: '#9AAABB', callback: v => '$' + Math.round(v).toLocaleString() }, beginAtZero: true },
      },
    },
  });
}

// Ad-trend chart: ad sales (bars) + organic sales (bars) + ROAS line on a
// secondary axis. Mirrors Merchant Spring's "Advertising performance trend".
function buildAdTrendChart(daily) {
  const el = document.getElementById('adTrendChart');
  if (!el) return;
  if (currentAdChart) currentAdChart.destroy();

  const labels   = (daily || []).map(d => d.date);
  const adSales  = (daily || []).map(d => Math.round((d.adSalesCad + d.adSalesUsd) * 100) / 100);
  const totalRev = (daily || []).map(d => Math.round((d.revCad + d.revUsd) * 100) / 100);
  // Organic = total - ad-attributed. Floored at 0 (rare: attributed > total
  // can happen because of the 14-day lookback overlap).
  const organic  = totalRev.map((tot, i) => Math.max(0, Math.round((tot - adSales[i]) * 100) / 100));
  const roas     = (daily || []).map(d => {
    const sp = (d.spendCad + d.spendUsd);
    const sa = (d.adSalesCad + d.adSalesUsd);
    return sp > 0 ? Math.round(sa / sp * 100) / 100 : null;
  });

  currentAdChart = new Chart(el, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Ad sales',      data: adSales, backgroundColor: '#537D30', stack: 'sales', borderWidth: 0, yAxisID: 'y' },
        { label: 'Organic sales', data: organic, backgroundColor: '#CBD5E1', stack: 'sales', borderWidth: 0, yAxisID: 'y' },
        { label: 'ROAS', data: roas, type: 'line', borderColor: '#1A2332', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y1' },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', align: 'end', labels: { font: { size: 11 }, color: '#5A6A82', usePointStyle: true } },
        tooltip: { mode: 'index', intersect: false },
