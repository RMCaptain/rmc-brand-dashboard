<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set your password — Rocky Mountain Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #faf8f2; color: #33392c; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border: 1px solid #e4e1d5; border-top: 3px solid #2c3a20; border-radius: 14px;
            box-shadow: 0 10px 40px rgba(44,58,32,0.08); width: 100%; max-width: 420px; padding: 36px 32px; }
    .logo { height: 64px; display: block; margin: 0 auto 16px; }
    h1 { font-family: 'Poppins', sans-serif; font-size: 19px; font-weight: 600; color: #2c3a20;
         text-align: center; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #6e7567; text-align: center; margin-bottom: 24px; line-height: 1.5; }
    .who { font-size: 12px; color: #6e7567; background: #f4f2ea; border-radius: 8px; padding: 10px 12px;
           margin-bottom: 18px; text-align: center; }
    .who strong { color: #2c3a20; }
    label { display: block; font-size: 12px; font-weight: 600; margin: 14px 0 6px; }
    input { width: 100%; padding: 13px 14px; font-size: 16px; font-family: 'Inter', sans-serif;
            border: 1px solid #e4e1d5; border-radius: 8px; outline: none; color: #33392c; }
    input:focus { border-color: #9db47e; box-shadow: 0 0 0 3px rgba(157,180,126,0.25); }
    button { width: 100%; margin-top: 18px; padding: 13px; background: #2c3a20; color: #fff; border: none;
             border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
             cursor: pointer; min-height: 48px; }
    button:hover { background: #3a4c2b; } button:disabled { opacity: 0.6; cursor: default; }
    .msg { margin-top: 14px; font-size: 13px; border-radius: 8px; padding: 11px 13px; display: none; }
    .msg.err { display: block; background: #fdecec; color: #a63d40; }
    .hint { font-size: 11px; color: #9aa093; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/portal/logo.png" alt="Rocky Mountain Co." />
    <h1>Set your password</h1>
    <p class="sub">You'll use this with your username to sign in from now on.</p>
    <div class="who" id="who" style="display:none;"></div>

    <form id="form">
      <label for="pw1">New password</label>
      <input type="password" id="pw1" autocomplete="new-password" minlength="8" required />
      <p class="hint">At least 8 characters.</p>
      <label for="pw2">Confirm password</label>
      <input type="password" id="pw2" autocomplete="new-password" minlength="8" required />
      <button type="submit" id="btn">Save password</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const msg = document.getElementById('msg');
    // Identity strip — also proves the session is live; bounce if not.
    (async () => {
      try {
        const res = await fetch('/api/portal/me');
        if (res.status === 401) { location.href = '/portal/login'; return; }
        const me = await res.json();
        const who = document.getElementById('who');
        who.style.display = 'block';
        who.innerHTML = 'Signing in as <strong>' + (me.username || me.email) + '</strong> — ' + me.brandName;
      } catch { location.href = '/portal/login'; }
    })();

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('pw1').value, p2 = document.getElementById('pw2').value;
      msg.className = 'msg';
      if (p1 !== p2) { msg.className = 'msg err'; msg.textContent = 'Passwords don’t match.'; return; }
      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/portal/set-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: p1 }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        location.href = '/portal';
        return;
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = err.message || 'Could not save — try again.';
      }
      btn.disabled = false; btn.textContent = 'Save password';
    });
  </script>
</body>
</html>
